<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL Playoffs Admin — BetFanatics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0b;
    --bg-secondary: #131316;
    --bg-tertiary: #1a1a1e;
    --bg-elevated: #1f1f24;
    --border: #2a2a31;
    --border-light: #3a3a42;
    --text-primary: #f5f5f4;
    --text-secondary: #a0a0a8;
    --text-tertiary: #6b6b74;
    --text-disabled: #4a4a52;
    --accent: #8b5cf6;
    --accent-bright: #a78bfa;
    --accent-dim: #5b21b6;
    --top-color: #f97316;
    --bot-color: #06b6d4;
    --positive: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --body: 'Geist', system-ui, sans-serif;
    --mono: 'Geist Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--body);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    background-image:
      radial-gradient(at 20% 0%, rgba(139, 92, 246, 0.06) 0px, transparent 50%),
      radial-gradient(at 80% 100%, rgba(248, 113, 113, 0.04) 0px, transparent 50%);
    background-attachment: fixed;
  }

  .app { max-width: 1500px; margin: 0 auto; padding: 24px 20px 80px; }

  /* PASSWORD GATE */
  .gate {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column;
  }
  .gate-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; max-width: 400px; width: 100%;
    text-align: center;
  }
  .gate-card h2 {
    font-family: var(--display); font-weight: 700; font-size: 24px;
    margin-bottom: 8px; color: var(--text-primary);
  }
  .gate-card p {
    color: var(--text-tertiary); font-size: 13px; margin-bottom: 20px;
  }
  .gate-card input {
    width: 100%; padding: 12px 14px; margin-bottom: 12px;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    color: var(--text-primary); border-radius: 8px;
    font-family: var(--body); font-size: 15px;
  }
  .gate-card input:focus {
    outline: none; border-color: var(--accent);
  }
  .gate-error {
    color: var(--danger); font-size: 12px; margin-top: 8px;
    font-family: var(--mono);
  }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 24px;
    flex-wrap: wrap; gap: 16px;
  }
  .header h1 {
    font-family: var(--display); font-weight: 700; font-size: 32px;
    letter-spacing: -0.02em; line-height: 1;
  }
  .header h1 .accent { color: var(--danger); }
  .header .subtitle {
    color: var(--text-tertiary); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; margin-top: 6px; font-weight: 500;
  }
  .header-right { display: flex; gap: 12px; align-items: center; }

  /* MODIFIED BANNER */
  .modified-banner {
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
    border: 1px solid var(--warn); border-radius: 10px;
    padding: 14px 20px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .modified-banner-text {
    font-family: var(--display); font-weight: 600; color: var(--warn);
    font-size: 15px;
  }
  .modified-banner-actions { display: flex; gap: 8px; }

  button {
    background: var(--bg-elevated); border: 1px solid var(--border);
    color: var(--text-primary); padding: 9px 14px; border-radius: 8px;
    font-family: var(--body); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover:not(:disabled) {
    border-color: var(--border-light); background: var(--bg-tertiary);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary); }
  button.primary:hover { background: var(--accent); }
  button.secondary {
    background: var(--bg-tertiary); border-color: var(--border-light);
    color: var(--text-secondary);
  }
  button.secondary:hover { background: var(--bg-elevated, var(--bg-tertiary)); color: var(--text-primary); }
  button.toggle.active {
    background: var(--accent-dim); border-color: var(--accent);
    color: var(--text-primary);
  }
  button.warn {
    background: rgba(251, 191, 36, 0.15); border-color: var(--warn);
    color: var(--warn);
  }
  button.warn:hover { background: rgba(251, 191, 36, 0.25); }
  button.danger {
    background: rgba(248, 113, 113, 0.15); border-color: var(--danger);
    color: var(--danger);
  }
  button.danger:hover { background: rgba(248, 113, 113, 0.25); }

  /* ROUND TABS */
  .round-tabs {
    display: flex; justify-content: center; gap: 4px; margin-bottom: 16px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
    flex-wrap: wrap;
  }
  .round-tab {
    padding: 10px 28px; text-align: center; cursor: pointer;
    border-radius: 7px; font-family: var(--display); font-size: 14px;
    font-weight: 600; color: var(--text-tertiary);
    transition: all 0.15s; background: transparent; border: none;
    letter-spacing: -0.01em;
  }
  .round-tab:hover { color: var(--text-primary); }
  .round-tab.active {
    background: var(--bg-elevated); color: var(--accent-bright);
    box-shadow: 0 0 0 1px var(--accent-dim);
  }

  /* SERIES TABS */
  .series-tabs {
    display: grid; gap: 8px; margin-bottom: 24px;
  }
  .series-tabs[data-round="round1"] { grid-template-columns: repeat(4, 1fr); }
  .series-tabs[data-round="round2"] { grid-template-columns: repeat(2, 1fr); }
  .series-tabs[data-round="round3"] { grid-template-columns: 1fr; max-width: 320px; margin-left: auto; margin-right: auto; }
  .series-tabs[data-round="round4"] { grid-template-columns: 1fr; max-width: 320px; margin-left: auto; margin-right: auto; }
  @media (max-width: 700px) {
    .series-tabs[data-round="round1"] { grid-template-columns: repeat(2, 1fr); }
    .series-tabs[data-round="round2"] { grid-template-columns: 1fr; }
  }
  .series-tab {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 12px; cursor: pointer;
    transition: all 0.15s; font-family: var(--body);
    color: var(--text-primary);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    position: relative;
  }
  .series-tab:hover { border-color: var(--accent); }
  .series-tab.active {
    background: var(--bg-elevated); border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .series-tab.modified::after {
    content: ''; position: absolute; top: 8px; right: 8px;
    width: 8px; height: 8px; border-radius: 50%; background: var(--warn);
  }
  .series-tab.complete {
    border-color: var(--positive);
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.05), transparent);
  }
  .series-tab-teams {
    font-family: var(--display); font-size: 14px; font-weight: 600;
    text-align: center; line-height: 1.2;
  }
  .series-tab-score {
    font-family: var(--mono); font-size: 18px; font-weight: 600;
    color: var(--accent-bright);
    padding: 3px 14px; border-radius: 6px;
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid var(--accent-dim);
    letter-spacing: 0.04em;
  }
  .series-tab.complete .series-tab-score {
    color: var(--positive);
    background: rgba(52, 211, 153, 0.1);
    border-color: var(--positive);
  }

  /* PANELS */
  .panel {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: var(--display); font-size: 14px; font-weight: 600;
    color: var(--text-primary); letter-spacing: -0.01em;
  }
  .mode-toggle { display: flex; gap: 6px; }
  .mode-toggle button { padding: 6px 12px; font-size: 12px; }

  /* DERIVED MODE PANEL */
  .derived-panel { display: flex; flex-direction: column; gap: 14px; }
  .derived-fallback {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.4);
    border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 12px;
  }
  .derived-fallback-title { color: rgb(245, 158, 11); font-weight: 600; font-size: 13px; }
  .derived-fallback-desc { color: var(--text-secondary); font-size: 12px; line-height: 1.5; }
  .derived-formula-card {
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
  }
  .derived-formula-title {
    font-family: var(--display); font-weight: 600; font-size: 13px;
    color: var(--text-secondary); margin-bottom: 10px; letter-spacing: -0.01em;
  }
  .derived-formula-row {
    display: flex; align-items: center; gap: 10px; padding: 5px 0;
    flex-wrap: wrap; font-size: 12px;
  }
  .derived-team-tag {
    font-family: var(--mono); font-weight: 700; font-size: 11px;
    padding: 3px 8px; border-radius: 4px; min-width: 38px; text-align: center;
  }
  .derived-team-tag.top { background: var(--top-color, var(--accent)); color: white; }
  .derived-team-tag.bot { background: var(--bot-color, var(--accent-bright)); color: white; }
  .derived-formula-equals {
    font-family: var(--mono); color: var(--text-primary); font-weight: 600; font-size: 12px;
  }
  .derived-component {
    font-family: var(--mono); font-size: 11px; color: var(--text-tertiary);
    padding: 2px 6px; background: var(--bg-secondary); border-radius: 3px;
  }
  .derived-formula-divider {
    height: 1px; background: var(--border); margin: 8px 0;
  }
  .derived-formula-label {
    font-size: 12px; color: var(--text-secondary); min-width: 130px;
  }
  .derived-formula-value {
    font-family: var(--mono); font-weight: 600; color: var(--text-primary); font-size: 12px;
  }
  .derived-formula-note {
    font-size: 11px; color: var(--text-tertiary); font-style: italic;
  }
  .derived-output-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  }
  @media (max-width: 720px) {
    .derived-output-grid { grid-template-columns: 1fr; }
  }
  .derived-output-card {
    background: var(--bg-tertiary); border-radius: 10px; padding: 14px;
    border-left: 3px solid var(--accent);
  }
  .derived-output-card.top { border-left-color: var(--top-color, var(--accent)); }
  .derived-output-card.bot { border-left-color: var(--bot-color, var(--accent-bright)); }
  .derived-output-label {
    font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .derived-output-value {
    font-family: var(--display); font-weight: 700; font-size: 26px;
    color: var(--text-primary); margin-bottom: 4px;
  }
  .derived-output-formula {
    font-family: var(--mono); font-size: 10px; color: var(--text-tertiary);
  }
  .derived-source-note {
    font-size: 11px; color: var(--text-tertiary); text-align: center; padding: 4px;
  }
  .derived-source-note code {
    font-family: var(--mono); background: var(--bg-tertiary);
    padding: 1px 5px; border-radius: 3px; color: var(--text-secondary);
  }

  /* OUTRIGHTS VIEW (admin) */
  .outrights-banner {
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.10), rgba(139, 92, 246, 0.02));
    border: 1px solid var(--accent); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 20px;
  }
  .outrights-banner-title {
    font-family: var(--display); font-weight: 600; font-size: 16px;
    color: var(--accent-bright); letter-spacing: -0.01em; margin-bottom: 4px;
  }
  .outrights-banner-desc {
    font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  }
  .markets-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 16px;
  }
  .market { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .market.wide { grid-column: 1 / -1; }
  .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .market-title { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--text-primary); letter-spacing: -0.01em; }
  .market-tag {
    font-family: var(--mono); font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .col-headers {
    display: grid; grid-template-columns: 1fr 80px 80px 80px;
    font-family: var(--mono); font-size: 9px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 4px 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .col-headers span:not(:first-child) { text-align: right; }
  .market-body { display: flex; flex-direction: column; gap: 1px; }
  .row {
    display: grid; grid-template-columns: 1fr 80px 80px 80px;
    align-items: center; padding: 8px;
    border-radius: 6px; transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .row:hover { background: rgba(255,255,255,0.02); border-left-color: var(--row-team-color, var(--border)); }
  .row.muted { opacity: 0.35; }
  .row-prob, .row-decimal, .row-american {
    font-family: var(--mono); font-size: 12px; text-align: right;
  }
  .row-prob { color: var(--text-secondary); }
  .row-decimal { color: var(--text-primary); font-weight: 600; }
  .row-american.fav { color: rgb(74, 222, 128); font-weight: 700; }
  .row-american.dog { color: var(--text-primary); font-weight: 700; }
  .market-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  }
  .market-footer-label { font-size: 11px; color: var(--text-tertiary); }
  .outright-team { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .outright-team-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .outright-team-stack { display: flex; flex-direction: column; min-width: 0; gap: 2px; }
  .outright-team-line { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .outright-team-short {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--text-primary); min-width: 38px;
  }
  .outright-team-name {
    font-size: 12px; color: var(--text-tertiary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .outright-team-diag {
    font-family: var(--mono); font-size: 10px; color: var(--text-tertiary);
    opacity: 0.85;
  }
  .bias-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; line-height: 1;
  }
  .bias-badge.pos { background: rgba(34, 197, 94, 0.15); color: rgb(74, 222, 128); }
  .bias-badge.neg { background: rgba(239, 68, 68, 0.15); color: rgb(248, 113, 113); }

  /* BLEND CONTROLS (admin) */
  .blend-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .blend-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .blend-card.active {
    border-color: var(--accent-bright);
    box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.2);
  }
  .blend-header { display: flex; align-items: center; justify-content: space-between; }
  .blend-title {
    font-family: var(--display); font-weight: 600; font-size: 13px;
    color: var(--text-primary); letter-spacing: -0.01em;
  }
  .blend-status {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    padding: 3px 7px; border-radius: 3px; letter-spacing: 0.05em;
  }
  .blend-status.on { background: rgba(34, 197, 94, 0.15); color: rgb(74, 222, 128); }
  .blend-status.off { background: var(--bg-tertiary); color: var(--text-tertiary); }
  .blend-paste-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 540px) { .blend-paste-grid { grid-template-columns: 1fr; } }
  .blend-paste { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .blend-paste label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-tertiary); display: flex; align-items: center; justify-content: space-between;
  }
  .parse-count.ok {
    font-family: var(--mono); color: rgb(74, 222, 128); font-size: 10px;
    text-transform: none; letter-spacing: 0;
  }
  .blend-textarea {
    width: 100%; min-height: 90px; max-height: 200px; resize: vertical;
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px; font-family: var(--mono); font-size: 11px;
    color: var(--text-primary); line-height: 1.4;
  }
  .blend-textarea:focus { outline: none; border-color: var(--accent-bright); }
  .blend-controls-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding-top: 4px; border-top: 1px solid var(--border);
  }
  .blend-weight-label { font-size: 11px; color: var(--text-secondary); min-width: 200px; }
  .blend-weight-label strong { color: var(--text-primary); font-family: var(--mono); }
  .blend-weight-slider { flex: 1; min-width: 120px; }
  .blend-actions { display: flex; gap: 6px; }
  .btn-recalc, .btn-clear {
    padding: 6px 12px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
    font-family: var(--display); letter-spacing: 0.02em; transition: all 0.15s;
  }
  .btn-recalc { background: var(--accent); color: white; border-color: var(--accent-bright); }
  .btn-recalc:hover:not(:disabled) { background: var(--accent-bright); }
  .btn-recalc:disabled { opacity: 0.4; cursor: not-allowed; background: var(--bg-tertiary); color: var(--text-tertiary); border-color: var(--border); }
  .btn-clear { background: transparent; color: var(--text-secondary); }
  .btn-clear:hover { background: var(--bg-tertiary); color: var(--text-primary); }

  /* BIAS EDITOR (admin only) */
  .bias-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .bias-grid { grid-template-columns: 1fr; } }
  .bias-column { display: flex; flex-direction: column; gap: 4px; }
  .bias-column-title {
    font-family: var(--display); font-size: 12px; font-weight: 600;
    color: var(--text-secondary); letter-spacing: 0.02em;
    padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 6px;
  }
  .bias-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px; border-radius: 4px;
  }
  .bias-row:hover { background: var(--bg-tertiary); }
  .bias-team {
    font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-primary);
    display: flex; align-items: center; gap: 6px;
  }
  .bias-team-name {
    font-family: var(--sans); font-weight: 400; color: var(--text-tertiary); font-size: 11px;
  }
  .bias-input-group {
    display: flex; align-items: center; gap: 4px;
  }
  .bias-input-group input {
    width: 60px; padding: 4px 6px; font-family: var(--mono); font-size: 11px;
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-primary); text-align: right;
  }
  .bias-input-group input:focus { outline: none; border-color: var(--accent-bright); }
  .bias-unit { font-family: var(--mono); color: var(--text-tertiary); font-size: 11px; }
  .bias-empty { color: var(--text-tertiary); font-size: 11px; padding: 8px; text-align: center; }

  /* CUP PRICE EDITOR (the heart of admin outrights workflow) */
  .cup-edit-panel { margin-bottom: 24px; }
  .cup-edit-note {
    font-family: var(--mono); font-size: 11px; color: var(--text-tertiary);
    padding: 6px 10px; margin-bottom: 12px;
    background: var(--bg-tertiary); border-radius: 4px;
    border-left: 2px solid var(--accent-bright);
  }
  .cup-edit-grid {
    display: flex; flex-direction: column; gap: 4px;
  }
  .cup-edit-row {
    display: grid;
    grid-template-columns: minmax(180px, 2fr) 110px 90px 90px 90px 200px 36px;

      <span class="copy-confirm" id="copyConfirm" style="display:none;">✓ Copied to clipboard</span>

<script src="engine.js"></script>
<script>
(function () {
  const E = window.PlayoffsEngine;
  const ORIGINAL = JSON.parse(JSON.stringify(window.PLAYOFFS_DATA));
  const PASSWORD = 'Tech';

  let workingData = JSON.parse(JSON.stringify(ORIGINAL));
  let activeRound = 'round1';
  let activeSeriesId = workingData.bracket.east.r1[0];

  const ROUND_DEFS = [
    { id: 'round1', label: 'Round 1', getSeriesIds: () => [...workingData.bracket.east.r1, ...workingData.bracket.west.r1] },
    { id: 'round2', label: 'Round 2', getSeriesIds: () => [...workingData.bracket.east.r2, ...workingData.bracket.west.r2] },
    { id: 'round3', label: 'Conference Finals', getSeriesIds: () => [workingData.bracket.east.r3, workingData.bracket.west.r3] },
    { id: 'round4', label: 'Stanley Cup Final', getSeriesIds: () => [workingData.bracket.final] },
    { id: 'outrights', label: 'Outrights', getSeriesIds: () => [], isOutrights: true }
  ];

  // Render immediately on load — no password gate.
  // (Gate code removed entirely.)

  // ===== MODIFIED TRACKING =====
  function getModifiedSeriesIds() {
    const ids = [];
    Object.keys(workingData.series).forEach(id => {
      if (JSON.stringify(workingData.series[id]) !== JSON.stringify(ORIGINAL.series[id])) {
        ids.push(id);
      }
    });
    return ids;
  }

  function isSeriesTBD(s) {
    return !s.topSeed.name || !s.botSeed.name;
  }
  function isSeriesComplete(s) {
    return s.state.topWins >= 4 || s.state.botWins >= 4;
  }
  function getActiveSeries() {
    return workingData.series[activeSeriesId];
  }

  // ===== RENDER =====
  function renderRoundTabs() {
    const el = document.getElementById('roundTabs');
    el.innerHTML = '';
    ROUND_DEFS.forEach(rd => {
      const btn = document.createElement('button');
      btn.className = 'round-tab' + (rd.id === activeRound ? ' active' : '');
      btn.textContent = rd.label;
      btn.addEventListener('click', () => {
        activeRound = rd.id;
        if (!rd.isOutrights) {
          const ids2 = rd.getSeriesIds();
          const first = ids2.find(id => !isSeriesTBD(workingData.series[id])) || ids2[0];
          activeSeriesId = first;
        }
        renderAll();
      });
      el.appendChild(btn);
    });
  }

  function renderSeriesTabs() {
    const el = document.getElementById('seriesTabs');
    el.dataset.round = activeRound;
    el.innerHTML = '';
    const rd = ROUND_DEFS.find(r => r.id === activeRound);
    if (rd.isOutrights) {
      el.style.display = 'none';
      return;
    }
    el.style.display = '';
    const modIds = getModifiedSeriesIds();
    rd.getSeriesIds().forEach(id => {
      const s = workingData.series[id];
      const tab = document.createElement('button');
      tab.className = 'series-tab';
      if (id === activeSeriesId) tab.classList.add('active');
      if (modIds.includes(id)) tab.classList.add('modified');
      if (isSeriesComplete(s)) tab.classList.add('complete');
      const top = s.topSeed.short || s.topSeed.name || 'TBD';
      const bot = s.botSeed.short || s.botSeed.name || 'TBD';
      const score = s.state.topWins + '-' + s.state.botWins;
      tab.innerHTML = `
        <div class="series-tab-teams">${top} vs ${bot}</div>
        <div class="series-tab-score">${score}</div>
      `;
      tab.addEventListener('click', () => {
        activeSeriesId = id;
        renderAll();
      });
      el.appendChild(tab);
    });
  }

  function renderModifiedBanner() {
    const banner = document.getElementById('modifiedBanner');
    const ids = getModifiedSeriesIds();
    const biasesChanged = JSON.stringify(workingData.outrightBiases || {}) !== JSON.stringify(ORIGINAL.outrightBiases || {});
    const overridesChanged = JSON.stringify(workingData.outrightOverrides || {}) !== JSON.stringify(ORIGINAL.outrightOverrides || {});
    const totalChanges = ids.length + (biasesChanged ? 1 : 0) + (overridesChanged ? 1 : 0);
    if (totalChanges === 0) {
      banner.style.display = 'none';
      return;
    }
    banner.style.display = '';
    const parts = [];
    if (ids.length > 0) parts.push(`${ids.length} series`);
    if (overridesChanged) parts.push('cup prices');
    if (biasesChanged) parts.push('biases');
    document.getElementById('modifiedText').textContent =
      `${parts.join(' + ')} modified — export to apply changes`;
  }

  function renderMain() {
    const el = document.getElementById('mainContent');
    const rd = ROUND_DEFS.find(r => r.id === activeRound);

    if (rd && rd.isOutrights) {
      el.innerHTML = renderOutrightsView();
      wireOutrightControls();
      return;
    }

    const s = getActiveSeries();

    let html = '';

    // Promote winner panel (for R2/R3/SCF where parent series is complete)
    html += renderPromotePanel(s);

    // TBD banner if applicable
    if (isSeriesTBD(s)) {
      html += `
        <div class="tbd-banner">
          <h2>This series is TBD</h2>
          <p>Use the Promote Winner panel above (if available) or set teams manually below.</p>
        </div>
      `;
    }

    // Series identity
    html += renderIdentityPanel(s);
    // Mode + odds
    html += renderInputsPanel(s);
    // State stepper
    html += renderStatePanel(s);
    // Margin overrides
    html += renderMarginPanel(s);

    el.innerHTML = html;
    applyTeamColors(s);
    wireMain(s);
  }

  // ===== BRACKET BUILDER (used by outrights view) =====
  // 7 columns × (1 header + 8 series rows). East rows 1-4, West rows 5-8.
  // R1 cells span 1 row, R2 cells span 2, R3 cells span 4, SCF spans 8.
  function buildBracketHTML() {
    const wd = workingData;
    const positions = [];
    wd.bracket.east.r1.forEach((id, i) => positions.push({ id, col: 1, row: 2 + i, span: 1 }));
    wd.bracket.east.r2.forEach((id, i) => positions.push({ id, col: 2, row: 2 + i * 2, span: 2 }));
    positions.push({ id: wd.bracket.east.r3, col: 3, row: 2, span: 4 });
    positions.push({ id: wd.bracket.final, col: 4, row: 2, span: 4 });
    positions.push({ id: wd.bracket.west.r3, col: 5, row: 2, span: 4 });
    wd.bracket.west.r2.forEach((id, i) => positions.push({ id, col: 6, row: 2 + i * 2, span: 2 }));
    wd.bracket.west.r1.forEach((id, i) => positions.push({ id, col: 7, row: 2 + i, span: 1 }));

    const labels = [
      { col: 1, text: 'Round 1 (E)' },
      { col: 2, text: 'Round 2 (E)' },
      { col: 3, text: 'Conf Final (E)' },
      { col: 4, text: 'Stanley Cup' },
      { col: 5, text: 'Conf Final (W)' },
      { col: 6, text: 'Round 2 (W)' },
      { col: 7, text: 'Round 1 (W)' }
    ];
    let html = '<div class="bracket-grid">';
    labels.forEach(l => {
      html += `<div class="bracket-col-label" style="grid-column:${l.col};">${l.text}</div>`;
    });
    positions.forEach(p => {
      const s = wd.series[p.id];
      if (!s) return;
      const top = s.topSeed.short || s.topSeed.name || 'TBD';
      const bot = s.botSeed.short || s.botSeed.name || 'TBD';
      const tbd = isSeriesTBD(s) ? 'tbd' : '';
      const complete = isSeriesComplete(s) ? 'complete' : '';
      const active = (p.id === activeSeriesId) ? 'active' : '';
      const topClass = isSeriesComplete(s) && s.state.topWins >= 4 ? 'winner' :
                       isSeriesComplete(s) ? 'eliminated' : '';
      const botClass = isSeriesComplete(s) && s.state.botWins >= 4 ? 'winner' :
                       isSeriesComplete(s) ? 'eliminated' : '';
      const topColor = (typeof NHL_TEAMS !== 'undefined' && NHL_TEAMS[s.topSeed.short])
        ? NHL_TEAMS[s.topSeed.short].home.primary : '';
      const botColor = (typeof NHL_TEAMS !== 'undefined' && NHL_TEAMS[s.botSeed.short])
        ? NHL_TEAMS[s.botSeed.short].home.primary : '';
      html += `
        <div class="bracket-cell ${active} ${complete} ${tbd}"
             style="grid-column:${p.col}; grid-row:${p.row} / span ${p.span};"
             data-bracket-id="${p.id}">
          <div class="bracket-team ${topClass}" ${topClass !== 'eliminated' && topColor ? `style="--cell-team-color:${topColor};"` : ''}>
            <span>${escapeHtml(top)}</span>
            <span class="bracket-team-score">${s.state.topWins}</span>
          </div>
          <div class="bracket-team ${botClass}" ${botClass !== 'eliminated' && botColor ? `style="--cell-team-color:${botColor};"` : ''}>
            <span>${escapeHtml(bot)}</span>
            <span class="bracket-team-score">${s.state.botWins}</span>
          </div>
        </div>
      `;
    });
    html += '</div>';
    return html;
  }

  // ===== OUTRIGHTS VIEW (admin) =====
  function renderOutrightsView() {
    const o = E.computeOutrights(workingData);
    const overrides = (workingData.outrightOverrides && workingData.outrightOverrides.scf) || {};
    const biases = workingData.outrightBiases || { eastConf: {}, westConf: {}, scf: {} };

    // ----- Render the read-only conference / cup market cards (display only) -----
    const renderTeamRow = (team, probField, offeredField, biasField) => {
      const fair = team[probField];
      const offered = team[offeredField];
      const dec = E.probToDecimal(offered);
      const american = E.decimalToAmerican(dec);
      const isFav = dec > 0 && dec < 2;
      const muted = team.eliminated ? 'muted eliminated' : (fair < 0.001 ? 'muted' : '');
      const teamData = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS[team.short] : null;
      const accent = teamData ? teamData.home.primary : 'var(--accent-bright)';
      const bias = team[biasField] || 0;
      const biasBadge = bias !== 0
        ? `<span class="bias-badge ${bias > 0 ? 'pos' : 'neg'}">${bias > 0 ? '+' : ''}${(bias * 100).toFixed(1)}%</span>`
        : '';
      const overrideBadge = (probField === 'fairWinStanleyCup' && team.scfOverridden)
        ? '<span class="override-badge">SET</span>' : '';
      const elimBadge = team.eliminated ? '<span class="elim-badge">OUT</span>' : '';
      return `
        <div class="row ${muted}" style="--row-team-color:${accent};">
          <div class="row-label outright-team">
            <span class="outright-team-dot" style="background:${accent};"></span>
            <div class="outright-team-stack">
              <div class="outright-team-line">
                <span class="outright-team-short">${escapeHtml(team.short)}</span>
                <span class="outright-team-name">${escapeHtml(team.name)}</span>
                ${biasBadge}${overrideBadge}${elimBadge}
              </div>
            </div>
          </div>
          <div class="row-prob">${team.eliminated ? '—' : E.fmtPct(fair)}</div>
          <div class="row-decimal">${team.eliminated ? '—' : E.fmtDecimal(dec)}</div>
          <div class="row-american ${team.eliminated ? '' : (isFav ? 'fav' : 'dog')}">${team.eliminated ? '—' : american}</div>
        </div>
      `;
    };

    const renderOutrightCard = (title, subtitle, teams, probField, offeredField, biasField, totalMargin, round, wide) => {
      const rowsHtml = teams.map(t => renderTeamRow(t, probField, offeredField, biasField)).join('');
      return `
        <div class="market ${wide ? 'wide' : ''}">
          <div class="market-header">
            <div class="market-title">${title}</div>
            <div class="market-tag">R${round} · ${subtitle}</div>
          </div>
          <div class="col-headers"><span>Team</span><span>Prob</span><span>Dec</span><span>US</span></div>
          <div class="market-body">${rowsHtml}</div>
          <div class="market-footer">
            <span class="market-footer-label">Overall Margin</span>
            ${renderMarginBadge(totalMargin)}
          </div>
        </div>
      `;
    };

    return `
      <div class="outrights-banner">
        <div class="outrights-banner-title">Outright / Futures Markets</div>
        <div class="outrights-banner-desc">
          Edit Stanley Cup prices below to anchor each team's outright probability.
          Conference winners derive automatically from the SCF column. Conference biases
          (in 0.1pp increments) shift derived conf prices without affecting Cup prices.
          Margins drop gradually as series complete.
        </div>
      </div>

      ${renderCupPriceEditor(o, overrides, biases)}

      <div class="markets-grid">
        ${renderOutrightCard('Eastern Conference Winner', '8 teams', o.eastTeams, 'fairWinConference', 'offeredWinConference', 'biasConference', o.eastConfMargin, o.eastRound)}
        ${renderOutrightCard('Western Conference Winner', '8 teams', o.westTeams, 'fairWinConference', 'offeredWinConference', 'biasConference', o.westConfMargin, o.westRound)}
        ${renderOutrightCard('Stanley Cup Winner', '16 teams', o.allTeamsByCup, 'fairWinStanleyCup', 'offeredWinStanleyCup', 'biasStanleyCup', o.scfMargin, o.scfRound, true)}
      </div>

      <div class="outrights-bracket-section">
        <div class="outrights-bracket-title">Bracket Overview</div>
        ${buildBracketHTML()}
      </div>
    `;
  }

  // Stanley Cup Price editor — the heart of the outrights workflow.
  // Each row: team identity + American odds input + read-only probability + conference bias slider.
  // Eliminated teams are shown but not editable.
  function renderCupPriceEditor(o, overrides, biases) {
    // Build a per-team row from the unsorted teams array but display sorted by current Cup prob descending.
    const rows = o.allTeamsByCup.slice().map(t => {
      const isEast = t.conference === 'East';
      const confBias = ((isEast ? biases.eastConf : biases.westConf) || {})[t.short] || 0;
      const fairCupPct = (t.fairWinStanleyCup * 100).toFixed(2);
      const offeredCupAmerican = t.eliminated ? '—' : E.decimalToAmerican(E.probToDecimal(t.offeredWinStanleyCup));
      const fairConfPct = (t.fairWinConference * 100).toFixed(2);
      // Display the override probability if set, otherwise the model probability rounded to American
      const displayProb = t.scfOverridden ? t.scfOverrideRaw : t.modelFairStanleyCup;
      const displayAmerican = (displayProb > 0 && displayProb < 1)
        ? E.decimalToAmerican(E.probToDecimal(displayProb))
        : '';
      const teamData = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS[t.short] : null;
      const accent = teamData ? teamData.home.primary : 'var(--accent-bright)';
      const elimClass = t.eliminated ? 'elim' : '';
      const overrideClass = t.scfOverridden ? 'overridden' : '';

      // Conference bias slider: 0.1pp increments, range -3pp to +3pp
      const sliderValue = (confBias * 1000).toFixed(0); // store as 1/1000 for slider
      const biasLabel = confBias === 0 ? '0' : ((confBias > 0 ? '+' : '') + (confBias * 100).toFixed(1));

      return `
        <div class="cup-edit-row ${elimClass} ${overrideClass}" style="--row-team-color:${accent};">
          <div class="cup-edit-team">
            <span class="cup-edit-dot" style="background:${accent};"></span>
            <div class="cup-edit-team-stack">
              <span class="cup-edit-team-short">${escapeHtml(t.short)}</span>
              <span class="cup-edit-team-name">${escapeHtml(t.name)}</span>
            </div>
            <span class="cup-edit-conf-tag">${t.conference}</span>
          </div>

          <div class="cup-edit-cell">
            <label>Cup Price</label>
            ${t.eliminated
              ? `<div class="cup-edit-value-elim">— eliminated —</div>`
              : `<input type="text" class="cup-price-input" data-team="${t.short}" value="${displayAmerican}" placeholder="+500">`
            }
          </div>

          <div class="cup-edit-cell readonly">
            <label>Cup Prob</label>
            <div class="cup-edit-value">${t.eliminated ? '0.00%' : fairCupPct + '%'}</div>
          </div>

          <div class="cup-edit-cell readonly">
            <label>Cup Offered</label>
            <div class="cup-edit-value">${t.eliminated ? '—' : offeredCupAmerican}</div>
          </div>

          <div class="cup-edit-cell readonly">
            <label>Conf Prob</label>
            <div class="cup-edit-value">${t.eliminated ? '0.00%' : fairConfPct + '%'}</div>
          </div>

          <div class="cup-edit-cell bias-cell">
            <label>Conf Bias <span class="bias-readout">${biasLabel}pp</span></label>
            ${t.eliminated
              ? `<div class="cup-edit-value-elim">—</div>`
              : `<input type="range" class="cup-bias-slider" data-team="${t.short}" data-conf="${t.conference}" min="-50" max="50" step="1" value="${sliderValue}">`
            }
          </div>

          <div class="cup-edit-actions">
            ${t.scfOverridden && !t.eliminated
              ? `<button class="btn-row-reset" data-team="${t.short}" title="Revert to MoneyPuck">↺</button>`
              : ''
            }
          </div>
        </div>
      `;
    }).join('');

    // Cup column input total (raw, before normalization) for diagnostic
    let userInputTotal = 0;
    let userInputCount = 0;
    Object.entries(overrides).forEach(([k, v]) => {
      if (typeof v === 'number') { userInputTotal += v; userInputCount++; }
    });
    const totalNote = userInputCount > 0
      ? `Override inputs sum to ${(userInputTotal * 100).toFixed(2)}% across ${userInputCount} teams (auto-renormalized to 100%)`
      : `No price overrides set — using MoneyPuck-derived Cup probabilities`;

    return `
      <div class="panel cup-edit-panel">
        <div class="panel-header">
          <div class="panel-title">Stanley Cup Prices (trader anchors)</div>
          <button class="btn-clear" id="resetAllCupOverrides">Reset all to MoneyPuck</button>
        </div>
        <div class="cup-edit-note">${totalNote}</div>
        <div class="cup-edit-grid">
          ${rows}
        </div>
      </div>
    `;
  }

  function wireOutrightControls() {
    // Cup price input handlers: parse American odds → store probability → re-render.
    document.querySelectorAll('.cup-price-input').forEach(inp => {
      inp.addEventListener('change', e => {
        const team = e.target.dataset.team;
        const raw = e.target.value.trim();
        if (!workingData.outrightOverrides) workingData.outrightOverrides = { scf: {} };
        if (!workingData.outrightOverrides.scf) workingData.outrightOverrides.scf = {};
        if (raw === '') {
          // Empty → remove override, fall back to MoneyPuck
          delete workingData.outrightOverrides.scf[team];
        } else {
          const prob = E.americanInputToProb(raw);
          if (prob === null) {
            // Invalid input — restore previous
            const prev = workingData.outrightOverrides.scf[team];
            e.target.value = (typeof prev === 'number') ? E.decimalToAmerican(E.probToDecimal(prev)) : '';
            return;
          }
          workingData.outrightOverrides.scf[team] = prob;
        }
        renderMain();
        renderModifiedBanner();
      });
    });

    // Conference bias sliders (0.1pp increments stored as raw value/1000)
    document.querySelectorAll('.cup-bias-slider').forEach(sl => {
      sl.addEventListener('input', e => {
        const team = e.target.dataset.team;
        const conf = e.target.dataset.conf;
        const sliderVal = parseInt(e.target.value, 10); // -30 to +30
        const biasProb = sliderVal / 1000; // -0.030 to +0.030 (-3pp to +3pp)
        if (!workingData.outrightBiases) workingData.outrightBiases = { eastConf: {}, westConf: {}, scf: {} };
        const marketKey = (conf === 'East') ? 'eastConf' : 'westConf';
        if (!workingData.outrightBiases[marketKey]) workingData.outrightBiases[marketKey] = {};
        if (Math.abs(biasProb) < 1e-9) {
          delete workingData.outrightBiases[marketKey][team];
        } else {
          workingData.outrightBiases[marketKey][team] = biasProb;
        }
        // Update just the readout label without full re-render to keep slider drag smooth
        const row = e.target.closest('.cup-edit-row');
        const readout = row.querySelector('.bias-readout');
        if (readout) {
          readout.textContent = (biasProb === 0 ? '0' : ((biasProb > 0 ? '+' : '') + (biasProb * 100).toFixed(1))) + 'pp';
        }
      });
      // On release, do a full re-render so all derived prices update
      sl.addEventListener('change', () => {
        renderMain();
        renderModifiedBanner();
      });
    });

    // Per-row Reset buttons (revert that team's Cup price to MoneyPuck)
    document.querySelectorAll('.btn-row-reset').forEach(btn => {
      btn.addEventListener('click', e => {
        const team = e.currentTarget.dataset.team;
        if (workingData.outrightOverrides && workingData.outrightOverrides.scf) {
          delete workingData.outrightOverrides.scf[team];
        }
        renderMain();
        renderModifiedBanner();
      });
    });

    // Reset all overrides
    const resetAllBtn = document.getElementById('resetAllCupOverrides');
    if (resetAllBtn) resetAllBtn.addEventListener('click', () => {
      if (!confirm('Reset all Stanley Cup price overrides and conference biases?')) return;
      workingData.outrightOverrides = { scf: {} };
      workingData.outrightBiases = { eastConf: {}, westConf: {}, scf: {} };
      renderMain();
      renderModifiedBanner();
    });

    // Bracket cell clicks (in the outrights bracket section) — jump to that series
    document.querySelectorAll('.outrights-bracket-section [data-bracket-id]').forEach(cell => {
      cell.addEventListener('click', () => {
        const id = cell.dataset.bracketId;
        const s = workingData.series[id];
        if (isSeriesTBD(s)) return;
        const rd = ROUND_DEFS.find(r => r.getSeriesIds && r.getSeriesIds().includes(id));
        if (rd) activeRound = rd.id;
        activeSeriesId = id;
        renderAll();
      });
    });
  }

  // Apply each team's home colors as CSS custom properties on the document root.
  // Falls back to the original orange/cyan if a team isn't in the NHL_TEAMS database.
  function applyTeamColors(s) {
    const root = document.documentElement;
    const top = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS[s.topSeed.short] : null;
    const bot = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS[s.botSeed.short] : null;
    root.style.setProperty('--top-color', top ? top.home.primary : '#f97316');
    root.style.setProperty('--top-color-secondary', top ? top.home.secondary : '#ffffff');
    root.style.setProperty('--top-color-away', top ? top.away.primary : '#f97316');
    root.style.setProperty('--bot-color', bot ? bot.home.primary : '#06b6d4');
    root.style.setProperty('--bot-color-secondary', bot ? bot.home.secondary : '#ffffff');
    root.style.setProperty('--bot-color-away', bot ? bot.away.primary : '#06b6d4');
  }

  function renderPromotePanel(s) {
    // Check if this series has a bracketConnection (R2+, conf, scf)
    const conn = workingData.bracketConnections[activeSeriesId];
    if (!conn) return '';
    const topParent = workingData.series[conn.topFrom];
    const botParent = workingData.series[conn.botFrom];
    const topComplete = isSeriesComplete(topParent);
    const botComplete = isSeriesComplete(botParent);
    if (!topComplete && !botComplete) return '';
    const topWinner = topComplete ? (topParent.state.topWins >= 4 ? topParent.topSeed : topParent.botSeed) : null;
    const botWinner = botComplete ? (botParent.state.topWins >= 4 ? botParent.topSeed : botParent.botSeed) : null;

    const currentTopName = s.topSeed.name;
    const currentBotName = s.botSeed.name;

    let actions = '';
    if (topWinner) {
      const isPlaced = currentTopName === topWinner.name || currentBotName === topWinner.name;
      if (!isPlaced) {
        actions += `<button class="primary" data-promote="topToTop" data-team="${escapeAttr(topWinner.name)}" data-short="${escapeAttr(topWinner.short)}">Place ${escapeHtml(topWinner.name)} as Top Seed</button>`;
        actions += `<button data-promote="topToBot" data-team="${escapeAttr(topWinner.name)}" data-short="${escapeAttr(topWinner.short)}">Place ${escapeHtml(topWinner.name)} as Bottom Seed</button>`;
      }
    }
    if (botWinner) {
      const isPlaced = currentTopName === botWinner.name || currentBotName === botWinner.name;
      if (!isPlaced) {
        actions += `<button class="primary" data-promote="botToBot" data-team="${escapeAttr(botWinner.name)}" data-short="${escapeAttr(botWinner.short)}">Place ${escapeHtml(botWinner.name)} as Bottom Seed</button>`;
        actions += `<button data-promote="botToTop" data-team="${escapeAttr(botWinner.name)}" data-short="${escapeAttr(botWinner.short)}">Place ${escapeHtml(botWinner.name)} as Top Seed</button>`;
      }
    }
    if (!actions) return '';

    return `
      <div class="promote-panel">
        <div class="promote-panel-title">Bracket Advance Available</div>
        <div class="promote-panel-desc">A prior series has settled. Choose where the winner slots into this series.</div>
        <div class="promote-actions">${actions}</div>
      </div>
    `;
  }

  function renderIdentityPanel(s) {
    const allTeams = (typeof teamsSortedByName === 'function') ? teamsSortedByName() : [];
    // Filter to teams that can legally be slotted into this series (division for R1/R2,
    // conference for R3, any team for SCF). Note this gives a CODE list, so we cross-reference.
    const eligibleCodes = E.eligibleTeamsForSeries
      ? new Set(E.eligibleTeamsForSeries(activeSeriesId))
      : new Set(allTeams.map(t => t.short));
    const eligibleTeams = allTeams.filter(t => eligibleCodes.has(t.short));

    // Determine the constraint label for the user
    const id = (activeSeriesId || '').toLowerCase();
    let scopeLabel = '';
    if (/atl/.test(id)) scopeLabel = 'Atlantic Division only';
    else if (/met/.test(id)) scopeLabel = 'Metropolitan Division only';
    else if (/cen/.test(id)) scopeLabel = 'Central Division only';
    else if (/pac/.test(id)) scopeLabel = 'Pacific Division only';
    else if (id.startsWith('e3')) scopeLabel = 'Eastern Conference only';
    else if (id.startsWith('w3')) scopeLabel = 'Western Conference only';
    else scopeLabel = 'Any team';

    const buildOptions = (currentShort, currentName) => {
      let html = `<option value="">— Empty / TBD —</option>`;
      eligibleTeams.forEach(({ short, name }) => {
        const sel = short === currentShort ? ' selected' : '';
        html += `<option value="${short}"${sel}>${escapeHtml(name)}</option>`;
      });
      // If the currently slotted team isn't in the eligible list (e.g., legacy data
      // or scope mismatch), keep it as a "Custom" option so we don't drop the slot.
      if (currentShort && !eligibleTeams.find(t => t.short === currentShort)) {
        html += `<option value="${escapeAttr(currentShort)}" selected>⚠ Out of scope: ${escapeHtml(currentName || currentShort)}</option>`;
      }
      return html;
    };

    return `
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Series Identity</div>
          <div class="panel-tag">${escapeHtml(scopeLabel)} (${eligibleTeams.length})</div>
        </div>
        <div class="identity-grid" style="grid-template-columns: 1fr 1fr;">
          <div class="control-group">
            <label>Top Seed</label>
            <div class="team-input">
              <span class="team-dot top"></span>
              <select id="topTeamSelect">${buildOptions(s.topSeed.short, s.topSeed.name)}</select>
            </div>
          </div>
          <div class="control-group">
            <label>Bottom Seed</label>
            <div class="team-input">
              <span class="team-dot bot"></span>
              <select id="botTeamSelect">${buildOptions(s.botSeed.short, s.botSeed.name)}</select>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderInputsPanel(s) {
    const mode = s.mode || 'derived';
    const teams = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS : {};
    const topShort = s.topSeed && s.topSeed.short;
    const botShort = s.botSeed && s.botSeed.short;
    const tp = (topShort && teams[topShort] && teams[topShort].power) ? teams[topShort].power : null;
    const bp = (botShort && teams[botShort] && teams[botShort].power) ? teams[botShort].power : null;
    const bothKnown = tp && bp;

    return `
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Pricing Inputs</div>
          <div class="mode-actions">
            <span class="mode-indicator ${mode}">${mode === 'manual' ? 'MANUAL' : 'MONEYPUCK'}</span>
            ${mode === 'manual' && bothKnown ? '<button class="btn-reset" data-action="reset-derived">Reset to MoneyPuck</button>' : ''}
          </div>
        </div>
        ${bothKnown ? renderUnifiedGameGrid(s) : renderTBDFallback(s)}
      </div>
    `;
  }

  function renderTBDFallback(s) {
    return `
      <div class="derived-fallback">
        <div class="derived-fallback-title">⚠️ Series is TBD</div>
        <div class="derived-fallback-desc">
          One or both teams are not yet slotted. Set teams in the identity panel above
          to populate per-game prices. Outright markets continue to project this series
          using full matchup enumeration.
        </div>
      </div>
    `;
  }

  // Unified per-game grid: 7 games, all editable, defaulted from MoneyPuck (derived).
  // Editing any game switches series mode to 'manual' and persists per-game value.
  function renderUnifiedGameGrid(s) {
    const totalPlayed = s.state.topWins + s.state.botWins;
    let gamesHtml = '';
    for (let g = 1; g <= 7; g++) {
      const isHome = E.isTopHome(g);
      const homeClass = isHome ? 'top' : 'bot';
      const homeLabel = isHome ? (s.topSeed.short || 'TOP') : (s.botSeed.short || 'BOT');
      const played = g <= totalPlayed;
      const stateBefore = E.stateAfterGame(s, g - 1);
      const stateAfter = E.stateAfterGame(s, g);
      let resultClass = '', resultText = '';
      if (played && stateBefore && stateAfter) {
        if (stateAfter[0] > stateBefore[0]) {
          resultClass = 'top-won';
          resultText = (s.topSeed.short || 'TOP') + ' WON';
        } else {
          resultClass = 'bot-won';
          resultText = (s.botSeed.short || 'BOT') + ' WON';
        }
      }
      const prob = E.topWinProbForGame(s, g);
      const american = E.probToAmerican(prob);
      gamesHtml += `
        <div class="manual-game ${played ? 'played ' + resultClass : ''}">
          <div class="manual-game-label">
            <span>G${g}</span>
            <span class="manual-game-home ${homeClass}">${escapeHtml(homeLabel)} home</span>
          </div>
          <input type="text" data-game="${g}" class="manual-input" value="${american}" ${played ? 'disabled' : ''}>
          <div class="manual-game-implied">${(prob * 100).toFixed(1)}% top</div>
          ${played ? `<div class="manual-game-result ${resultClass}">${resultText}</div>` : ''}
        </div>
      `;
    }
    return `
      <div class="control-group" style="margin-top: 10px;">
        <label>Per-Game Top Seed Win Odds (American) — edit any to override MoneyPuck</label>
        <div class="manual-grid">${gamesHtml}</div>
      </div>
    `;
  }

  function renderStatePanel(s) {
    const totalPlayed = s.state.topWins + s.state.botWins;
    const ended = isSeriesComplete(s);
    const nextGame = ended ? null : totalPlayed + 1;

    let scheduleHtml = '';
    for (let g = 1; g <= 7; g++) {
      const home = E.isTopHome(g) ? 'top-home' : 'bot-home';
      const played = g <= totalPlayed ? 'played' : '';
      const next = g === nextGame ? 'next' : '';
      scheduleHtml += `<div class="game-pip ${home} ${played} ${next}">${g}</div>`;
    }

    return `
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Series State</div></div>
        <div class="panel-row">
          <div class="state-display">
            <div class="state-team top">
              <div class="state-team-name">${escapeHtml(s.topSeed.name) || 'Top'}</div>
              <div class="state-wins">${s.state.topWins}</div>
            </div>
            <div class="state-divider">·</div>
            <div class="state-team bot">
              <div class="state-team-name">${escapeHtml(s.botSeed.name) || 'Bot'}</div>
              <div class="state-wins">${s.state.botWins}</div>
            </div>
            <div class="state-meta">
              <div>Game <strong>${ended ? '—' : nextGame}</strong> next</div>
              <div>Home: <strong>${ended ? '—' : (E.isTopHome(nextGame) ? (s.topSeed.name || 'Top') : (s.botSeed.name || 'Bot'))}</strong></div>
              <div class="schedule">${scheduleHtml}</div>
            </div>
          </div>
          <div class="state-actions">
            <button class="undo" id="undoBtn" ${(s.state.history && s.state.history.length <= 1) ? 'disabled' : ''}>← Undo Last Game</button>
            <button class="win-top" id="topWinBtn" ${ended ? 'disabled' : ''}>
              <span class="team-dot top"></span> ${escapeHtml(s.topSeed.short || 'TOP')} Wins Game ${ended ? '' : nextGame}
            </button>
            <button class="win-bot" id="botWinBtn" ${ended ? 'disabled' : ''}>
              <span class="team-dot bot"></span> ${escapeHtml(s.botSeed.short || 'BOT')} Wins Game ${ended ? '' : nextGame}
            </button>
            <button class="danger" id="resetBtn">⟲ Reset to 0-0</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderMarginPanel(s) {
    const marketKeys = [
      ['seriesWinner', 'Series Winner'],
      ['correctScore', 'Correct Score'],
      ['totalGamesOU', 'Totals O/U'],
      ['totalGamesExact', 'Exact Games'],
      ['spreads', 'Spreads'],
      ['afterG3', 'After Game 3'],
      ['afterG4', 'After Game 4'],
      ['fromBehindNeverTrail', 'From Behind / NT'],
      ['g1AndSeries', 'G1 + Series Parlay']
    ];
    let cellsHtml = '';
    marketKeys.forEach(([key, label]) => {
      const seriesVal = s.margin && s.margin[key];
      const defaultVal = workingData.defaults.margin[key];
      const val = (typeof seriesVal === 'number') ? (seriesVal * 100).toFixed(1) : '';
      cellsHtml += `
        <div class="margin-cell">
          <label>${label} (default ${(defaultVal * 100).toFixed(1)}%)</label>
          <input type="text" data-margin="${key}" value="${val}" placeholder="${(defaultVal * 100).toFixed(1)}">
        </div>
      `;
    });
    return `
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Margin Overrides (% — leave blank for default)</div></div>
        <div class="margin-grid">${cellsHtml}</div>
      </div>
    `;
  }

  // ===== WIRE =====
  function wireMain(s) {
    // Promote
    document.querySelectorAll('[data-promote]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.promote;
        const team = btn.dataset.team;
        const short = btn.dataset.short;
        if (action === 'topToTop' || action === 'botToTop') {
          s.topSeed = { name: team, short: short };
        } else if (action === 'topToBot' || action === 'botToBot') {
          s.botSeed = { name: team, short: short };
        }
        renderAll();
      });
    });

    // Identity dropdowns — selecting a team auto-fills both name and short
    const wireTeamSelect = (id, seedKey) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('change', e => {
        const short = e.target.value;
        if (short && typeof NHL_TEAMS !== 'undefined' && NHL_TEAMS[short]) {
          s[seedKey] = { name: NHL_TEAMS[short].name, short: short };
        } else {
          s[seedKey] = { name: '', short: '' };
        }
        renderAll();
      });
    };
    wireTeamSelect('topTeamSelect', 'topSeed');
    wireTeamSelect('botTeamSelect', 'botSeed');

    // Reset to MoneyPuck button (only present when mode === 'manual')
    const resetBtn = document.querySelector('[data-action="reset-derived"]');
    if (resetBtn) resetBtn.addEventListener('click', () => {
      s.mode = 'derived';
      renderMain();
      renderModifiedBanner();
    });

    // Per-game inputs: editing any game switches series to manual mode and
    // seeds all 7 game values from the previously active mode.
    document.querySelectorAll('.manual-input').forEach(inp => {
      inp.addEventListener('change', e => {
        const game = parseInt(e.target.dataset.game, 10);
        const american = e.target.value.trim();
        const prob = E.americanToProb(american);
        if (prob === null || isNaN(prob)) {
          e.target.value = E.probToAmerican(E.topWinProbForGame(s, game));
          return;
        }
        if (s.mode !== 'manual') {
          for (let g = 1; g <= 7; g++) {
            s.manual['game' + g] = E.topWinProbForGame(s, g);
          }
          s.mode = 'manual';
        }
        s.manual['game' + game] = prob;
        renderMain();
        renderModifiedBanner();
      });
    });

    // State buttons
    const undoBtn = document.getElementById('undoBtn');
    if (undoBtn) undoBtn.addEventListener('click', () => {
      if (!s.state.history || s.state.history.length <= 1) return;
      s.state.history.pop();
      const last = s.state.history[s.state.history.length - 1];
      s.state.topWins = last[0];
      s.state.botWins = last[1];
      renderAll();
    });
    const topWinBtn = document.getElementById('topWinBtn');
    if (topWinBtn) topWinBtn.addEventListener('click', () => {
      s.state.topWins++;
      s.state.history.push([s.state.topWins, s.state.botWins]);
      renderAll();
    });
    const botWinBtn = document.getElementById('botWinBtn');
    if (botWinBtn) botWinBtn.addEventListener('click', () => {
      s.state.botWins++;
      s.state.history.push([s.state.topWins, s.state.botWins]);
      renderAll();
    });
    const resetStateBtn = document.getElementById('resetBtn');
    if (resetStateBtn) resetStateBtn.addEventListener('click', () => {
      if (!confirm('Reset this series to 0-0?')) return;
      s.state.topWins = 0;
      s.state.botWins = 0;
      s.state.history = [[0, 0]];
      renderAll();
    });

    // Margin overrides
    document.querySelectorAll('[data-margin]').forEach(inp => {
      inp.addEventListener('change', e => {
        const key = e.target.dataset.margin;
        const v = e.target.value.trim();
        if (v === '') {
          delete s.margin[key];
        } else {
          const parsed = parseFloat(v);
          if (!isNaN(parsed)) {
            s.margin[key] = parsed / 100;
          } else {
            e.target.value = '';
            delete s.margin[key];
          }
        }
        renderModifiedBanner();
      });
    });
  }

  // ===== EXPORT =====
  function buildExport() {
    workingData.generatedAt = new Date().toISOString();
    workingData.generatedBy = 'admin.html';
    const json = JSON.stringify(workingData, null, 2);
    return `// =============================================================================
// playoffs.js — Source of truth for NHL Playoff series data
// =============================================================================
// Generated by admin.html on ${new Date().toLocaleString()}.
// Replace this file in the GitHub repo to update live prices.
// =============================================================================

const PLAYOFFS_DATA = ${json};

// Attach to window so other script tags can access it.
if (typeof window !== 'undefined') {
  window.PLAYOFFS_DATA = PLAYOFFS_DATA;
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = PLAYOFFS_DATA;
}
`;
  }

  function showExportModal() {
    const content = buildExport();
    document.getElementById('exportContent').value = content;
    document.getElementById('exportModal').style.display = '';
  }

  document.getElementById('exportBtn').addEventListener('click', showExportModal);
  document.getElementById('exportBtn2').addEventListener('click', showExportModal);

  // Seed R1 matchups from standings. Uses the conference-seed convention
  // (better-record division winner faces the worse wild card).
  document.getElementById('seedFromStandingsBtn').addEventListener('click', () => {
    const standings = workingData.standings;
    if (!standings) {
      alert('No standings configured in playoffs.js. Add a "standings" block with division orderings + wild cards before seeding.');
      return;
    }
    if (!confirm('Re-populate R1 matchups from standings? This will overwrite the current top/bottom seed for each R1 series. State (wins/losses) will be preserved.')) return;

    // Default convention: which division winner has the better record per conference?
    // Tim's current standings: CAR 113 > BUF 109, COL 121 > VGK 95.
    // So Metropolitan first in East, Central first in West.
    // To make this generic, we look at the first team in each division's standings array
    // and check NHL_TEAMS for a points value if available. For now we assume
    // the order [met,atl] for East and [cen,pac] for West which matches current data.
    // If you need to flip it (e.g. Atlantic top seed has better record next year),
    // edit the topConfSeeds object below or update standings ordering before seeding.
    const seeds = E.seedR1FromStandings(standings, undefined, {
      east: ['metropolitan', 'atlantic'],
      west: ['central', 'pacific']
    });

    Object.entries(seeds).forEach(([id, slot]) => {
      const s = workingData.series[id];
      if (!s) return;
      s.topSeed = slot.topSeed;
      s.botSeed = slot.botSeed;
    });
    renderAll();
    renderModifiedBanner();
  });

  // CSV export: download a CSV of all series-prop markets for one or all series.
  // Format: Market Type, Market Name, Selection, Price (decimal, 5 places).
  // Skips: completed series, TBD series, settled markets.
  function downloadCsv(filename, content) {
    const blob = new Blob([content], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  document.getElementById('exportSeriesCsvBtn').addEventListener('click', () => {
    if (!activeSeriesId) {
      alert('No series is currently selected. Click on a series tab first.');
      return;
    }
    const s = workingData.series[activeSeriesId];
    if (!s) {
      alert('Active series not found in workingData.');
      return;
    }
    const rows = E.buildSeriesPropsCSV(s, workingData.defaults, activeSeriesId);
    if (rows.length === 0) {
      alert('No market rows to export. The series may be complete, both teams may not be known yet, or this series has no slot mapping (conf finals / SCF are outright markets, not in this CSV).');
      return;
    }
    const csv = E.csvRowsToString(rows);
    const matchupShort = (s.topSeed.short || 'TBD') + '_vs_' + (s.botSeed.short || 'TBD');
    const ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
    downloadCsv(`series_${matchupShort}_${ts}.csv`, csv);
  });

  document.getElementById('exportAllCsvBtn').addEventListener('click', () => {
    // Walk every series in workingData; concatenate rows.
    const allRows = [];
    let seriesExported = 0;
    let seriesSkipped = 0;
    Object.entries(workingData.series).forEach(([id, s]) => {
      const rows = E.buildSeriesPropsCSV(s, workingData.defaults, id);
      if (rows.length > 0) {
        allRows.push(...rows);
        seriesExported++;
      } else {
        seriesSkipped++;
      }
    });
    if (allRows.length === 0) {
      alert('No exportable series — all are either complete, TBD, or fully settled.');
      return;
    }
    const csv = E.csvRowsToString(allRows);
    const ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
    downloadCsv(`playoffs_all_series_${ts}.csv`, csv);
    console.log(`Exported ${seriesExported} series (${allRows.length} rows). Skipped ${seriesSkipped} series.`);
  });

  document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('exportModal').style.display = 'none';
    document.getElementById('copyConfirm').style.display = 'none';
  });
  document.getElementById('copyBtn').addEventListener('click', () => {
    const ta = document.getElementById('exportContent');
    ta.select();
    navigator.clipboard.writeText(ta.value).then(() => {
      const c = document.getElementById('copyConfirm');
      c.style.display = '';
      setTimeout(() => { c.style.display = 'none'; }, 2000);
    });
  });
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const content = buildExport();
    const blob = new Blob([content], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'playoffs.js';
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('discardBtn').addEventListener('click', () => {
    if (!confirm('Discard all unsaved changes and reload from playoffs.js?')) return;
    workingData = JSON.parse(JSON.stringify(ORIGINAL));
    renderAll();
  });

  // ===== HELPERS =====
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }
  function escapeAttr(str) {
    return escapeHtml(str);
  }

  function renderMarginBadge(margin) {
    const color = E.marginBadgeColor ? E.marginBadgeColor(margin) : 'rgb(139,92,246)';
    return `<span class="margin-badge" style="background:${color}20;color:${color};border-color:${color}40;">M ${E.fmtMargin ? E.fmtMargin(margin) : (margin*100).toFixed(1) + '%'}</span>`;
  }

  function renderAll() {
    renderRoundTabs();
    renderSeriesTabs();
    renderMain();
    renderModifiedBanner();
  }

  renderAll();
})();
</script>

</body>
