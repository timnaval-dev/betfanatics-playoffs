<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL Playoffs Pricing — BetFanatics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0b;
    --bg-secondary: #131316;
    --bg-tertiary: #1a1a1e;
    --bg-elevated: #1f1f24;
    --border: #2a2a31;
    --border-light: #3a3a42;
    --text-primary: #f5f5f4;
    --text-secondary: #a0a0a8;
    --text-tertiary: #6b6b74;
    --text-disabled: #4a4a52;
    --accent: #8b5cf6;
    --accent-bright: #a78bfa;
    --accent-dim: #5b21b6;
    --top-color: #f97316;
    --bot-color: #06b6d4;
    --positive: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --body: 'Geist', system-ui, sans-serif;
    --mono: 'Geist Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    background-image:
      radial-gradient(at 20% 0%, rgba(139, 92, 246, 0.06) 0px, transparent 50%),
      radial-gradient(at 80% 100%, rgba(6, 182, 212, 0.04) 0px, transparent 50%);
    background-attachment: fixed;
  }

  .app { max-width: 1500px; margin: 0 auto; padding: 24px 20px 80px; }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 24px;
    flex-wrap: wrap; gap: 16px;
  }
  .header h1 {
    font-family: var(--display); font-weight: 700; font-size: 32px;
    letter-spacing: -0.02em; line-height: 1;
  }
  .header h1 .accent { color: var(--accent-bright); }
  .header .subtitle {
    color: var(--text-tertiary); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; margin-top: 6px; font-weight: 500;
  }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .brand {
    font-family: var(--mono); font-size: 10px; color: var(--text-tertiary);
    text-align: right; letter-spacing: 0.05em;
  }
  .brand strong { color: var(--text-secondary); font-weight: 500; }

  button {
    background: var(--bg-elevated); border: 1px solid var(--border);
    color: var(--text-primary); padding: 9px 14px; border-radius: 8px;
    font-family: var(--body); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover:not(:disabled) {
    border-color: var(--border-light); background: var(--bg-tertiary);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: var(--accent-dim); border-color: var(--accent);
    color: var(--text-primary);
  }
  button.primary:hover { background: var(--accent); }
  button.toggle.active {
    background: var(--accent-dim); border-color: var(--accent);
    color: var(--text-primary);
  }

  /* ROUND TABS */
  .round-tabs {
    display: flex; justify-content: center; gap: 4px; margin-bottom: 16px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
    flex-wrap: wrap;
  }
  .round-tab {
    padding: 10px 28px; text-align: center; cursor: pointer;
    border-radius: 7px; font-family: var(--display); font-size: 14px;
    font-weight: 600; color: var(--text-tertiary);
    transition: all 0.15s; background: transparent; border: none;
    letter-spacing: -0.01em;
  }
  .round-tab:hover:not(:disabled) { color: var(--text-primary); }
  .round-tab.active {
    background: var(--bg-elevated); color: var(--accent-bright);
    box-shadow: 0 0 0 1px var(--accent-dim);
  }
  .round-tab:disabled {
    color: var(--text-disabled); cursor: not-allowed;
  }

  /* SERIES SUB-TABS */
  .series-tabs {
    display: grid; gap: 8px; margin-bottom: 24px;
  }
  .series-tabs[data-round="round1"] { grid-template-columns: repeat(4, 1fr); }
  .series-tabs[data-round="round2"] { grid-template-columns: repeat(2, 1fr); }
  .series-tabs[data-round="round3"] { grid-template-columns: 1fr; max-width: 320px; margin-left: auto; margin-right: auto; }
  .series-tabs[data-round="round4"] { grid-template-columns: 1fr; max-width: 320px; margin-left: auto; margin-right: auto; }
  @media (max-width: 700px) {
    .series-tabs[data-round="round1"] { grid-template-columns: repeat(2, 1fr); }
    .series-tabs[data-round="round2"] { grid-template-columns: 1fr; }
  }
  .series-tab {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 12px; cursor: pointer;
    transition: all 0.15s; font-family: var(--body);
    color: var(--text-primary);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .series-tab:hover:not(:disabled) { border-color: var(--accent); }
  .series-tab.active {
    background: var(--bg-elevated); border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .series-tab:disabled {
    color: var(--text-disabled); background: var(--bg-secondary);
    cursor: not-allowed; opacity: 0.5;
  }
  .series-tab-teams {
    font-family: var(--display); font-size: 14px; font-weight: 600;
    text-align: center; line-height: 1.2;
  }
  .series-tab-score {
    font-family: var(--mono); font-size: 18px; font-weight: 600;
    color: var(--accent-bright);
    padding: 3px 14px; border-radius: 6px;
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid var(--accent-dim);
    letter-spacing: 0.04em;
  }
  .series-tab.tbd .series-tab-teams { color: var(--text-disabled); }
  .series-tab.complete {
    border-color: var(--positive);
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.05), transparent);
  }
  .series-tab.complete .series-tab-score {
    color: var(--positive);
    background: rgba(52, 211, 153, 0.1);
    border-color: var(--positive);
  }

  /* CONTROLS */
  .controls {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 24px;
  }
  .controls-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .controls-title {
    font-family: var(--display); font-size: 14px; font-weight: 600;
    color: var(--text-primary); letter-spacing: -0.01em;
  }
  .mode-toggle { display: flex; gap: 6px; }
  .mode-toggle button {
    padding: 6px 12px; font-size: 12px;
  }

  .controls-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  @media (max-width: 600px) {
    .controls-grid { grid-template-columns: 1fr; }
  }
  .control-group label {
    display: block; font-family: var(--mono); font-size: 10px;
    font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .team-input { display: flex; align-items: center; gap: 10px; }
  .team-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .team-dot.top { background: var(--top-color); }
  .team-dot.bot { background: var(--bot-color); }
  input[type="text"], input[type="number"] {
    background: var(--bg-tertiary); border: 1px solid var(--border);
    color: var(--text-primary); padding: 9px 12px; border-radius: 7px;
    font-family: var(--body); font-size: 14px; font-weight: 500; width: 100%;
    transition: all 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    outline: none; border-color: var(--accent); background: var(--bg-elevated);
  }

  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-value {
    font-family: var(--mono); font-size: 14px; font-weight: 600;
    color: var(--text-primary); min-width: 56px; text-align: right;
  }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 4px;
    background: var(--bg-tertiary); border-radius: 2px; outline: none;
    border: 1px solid var(--border);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
    background: var(--accent-bright); border: 2px solid var(--bg-primary);
    border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--accent-bright);
    border: 2px solid var(--bg-primary); border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 0 1px var(--accent);
  }

  /* MANUAL MODE GAME GRID */
  .manual-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
  }
  .manual-game {
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 8px; display: flex; flex-direction: column;
    gap: 6px; transition: all 0.15s;
  }
  .manual-game.played {
    opacity: 0.5;
  }
  .manual-game.played.top-won { border-color: color-mix(in srgb, var(--top-color) 50%, transparent); }
  .manual-game.played.bot-won { border-color: color-mix(in srgb, var(--bot-color) 50%, transparent); }
  .manual-game-label {
    font-family: var(--mono); font-size: 9px; font-weight: 500;
    color: var(--text-tertiary); text-transform: uppercase;
    letter-spacing: 0.06em; display: flex; justify-content: space-between;
    align-items: center;
  }
  .manual-game-home { font-size: 9px; }
  .manual-game-home.top { color: var(--top-color); }
  .manual-game-home.bot { color: var(--bot-color); }
  .manual-game input {
    text-align: center; padding: 6px; font-size: 13px;
  }
  .manual-game-implied {
    font-family: var(--mono); font-size: 10px; color: var(--text-secondary);
    text-align: center;
  }
  .manual-game-result {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    text-align: center; padding: 2px;
  }
  .manual-game-result.top-won { color: var(--top-color); }
  .manual-game-result.bot-won { color: var(--bot-color); }

  /* STATE PANEL */
  .state-panel {
    background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
    border: 1px solid var(--border); border-radius: 12px; padding: 20px;
    margin-bottom: 24px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 20px;
  }
  .state-display { display: flex; align-items: center; gap: 22px; }
  .state-team {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; min-width: 140px; max-width: 170px;
  }
  .state-team-name {
    font-family: var(--display); font-size: 12px; font-weight: 600;
    color: var(--text-secondary); letter-spacing: -0.01em;
    text-align: center;
  }
  .state-wins {
    font-family: var(--display); font-size: 56px; font-weight: 700;
    line-height: 1; letter-spacing: -0.04em;
  }
  .state-team.top .state-wins { color: var(--top-color); }
  .state-team.bot .state-wins { color: var(--bot-color); }
  .state-divider {
    color: var(--text-tertiary); font-family: var(--display);
    font-size: 40px; font-weight: 300;
  }
  .state-meta {
    display: flex; flex-direction: column; gap: 4px; font-family: var(--mono);
    font-size: 10px; color: var(--text-tertiary); text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .state-meta strong {
    color: var(--text-primary); font-weight: 500; font-size: 11px;
  }
  .state-actions { display: flex; flex-wrap: wrap; gap: 8px; }
  button.win-top:hover:not(:disabled) {
    border-color: var(--top-color); color: var(--top-color);
  }
  button.win-bot:hover:not(:disabled) {
    border-color: var(--bot-color); color: var(--bot-color);
  }
  button.reset { color: var(--text-tertiary); }
  button.reset:hover { color: var(--accent-bright); border-color: var(--accent); }

  .schedule { display: flex; gap: 4px; margin-top: 8px; }
  .game-pip {
    width: 26px; height: 26px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; font-family: var(--mono);
    font-size: 10px; font-weight: 600; border: 1px solid var(--border);
    background: var(--bg-tertiary); color: var(--text-tertiary);
  }
  .game-pip.top-home {
    background: color-mix(in srgb, var(--top-color) 12%, transparent);
    border-color: color-mix(in srgb, var(--top-color) 40%, transparent);
    color: var(--top-color);
  }
  .game-pip.bot-home {
    background: color-mix(in srgb, var(--bot-color) 12%, transparent);
    border-color: color-mix(in srgb, var(--bot-color) 40%, transparent);
    color: var(--bot-color);
  }
  .game-pip.played { opacity: 0.4; }
  .game-pip.next { box-shadow: 0 0 0 2px var(--accent); }

  /* SERIES ENDED BANNER */
  .series-ended {
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.15), rgba(52, 211, 153, 0.05));
    border: 1px solid var(--positive); border-radius: 12px; padding: 16px 24px;
    margin-bottom: 20px; text-align: center; font-family: var(--display);
    font-size: 16px; font-weight: 600; color: var(--positive);
  }
  .series-ended .winner {
    font-size: 22px; margin-top: 4px; color: var(--text-primary);
  }

  /* TBD STATE */
  .tbd-banner {
    background: var(--bg-secondary); border: 1px dashed var(--border);
    border-radius: 12px; padding: 32px; text-align: center;
    color: var(--text-tertiary);
  }
  .tbd-banner h2 {
    font-family: var(--display); font-size: 20px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 8px;
  }

  /* OUTRIGHTS */
  .outrights-banner {
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.10), rgba(139, 92, 246, 0.02));
    border: 1px solid var(--accent); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 20px;
  }
  .outrights-banner-title {
    font-family: var(--display); font-weight: 600; font-size: 16px;
    color: var(--accent-bright); letter-spacing: -0.01em; margin-bottom: 4px;
  }
  .outrights-banner-desc {
    font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  }
  .outright-team {
    display: flex; align-items: center; gap: 10px; min-width: 0;
  }
  .outright-team-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .outright-team-short {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--text-primary); min-width: 38px;
  }
  .outright-team-name {
    font-size: 12px; color: var(--text-tertiary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .outright-team-stack { display: flex; flex-direction: column; min-width: 0; gap: 2px; }
  .outright-team-line { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .outright-team-diag {
    font-family: var(--mono); font-size: 10px; color: var(--text-tertiary);
    margin-left: 0; opacity: 0.85;
  }
  .bias-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; line-height: 1;
  }
  .bias-badge.pos { background: rgba(34, 197, 94, 0.15); color: rgb(74, 222, 128); }
  .bias-badge.neg { background: rgba(239, 68, 68, 0.15); color: rgb(248, 113, 113); }
  .elim-badge {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; line-height: 1; letter-spacing: 0.06em;
    background: var(--bg-tertiary); color: var(--text-tertiary);
  }
  .row.eliminated { opacity: 0.4; }
  .row.eliminated .outright-team-name,
  .row.eliminated .outright-team-short { text-decoration: line-through; }

  /* BLEND CONTROLS */
  .blend-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .blend-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .blend-card.active {
    border-color: var(--accent-bright);
    box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.2);
  }
  .blend-header { display: flex; align-items: center; justify-content: space-between; }
  .blend-title {
    font-family: var(--display); font-weight: 600; font-size: 13px;
    color: var(--text-primary); letter-spacing: -0.01em;
  }
  .blend-status {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    padding: 3px 7px; border-radius: 3px; letter-spacing: 0.05em;
  }
  .blend-status.on { background: rgba(34, 197, 94, 0.15); color: rgb(74, 222, 128); }
  .blend-status.off { background: var(--bg-tertiary); color: var(--text-tertiary); }
  .blend-paste-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  @media (max-width: 540px) { .blend-paste-grid { grid-template-columns: 1fr; } }
  .blend-paste { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .blend-paste label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-tertiary); display: flex; align-items: center; justify-content: space-between;
  }
  .parse-count.ok {
    font-family: var(--mono); color: rgb(74, 222, 128); font-size: 10px;
    text-transform: none; letter-spacing: 0;
  }
  .blend-textarea {
    width: 100%; min-height: 90px; max-height: 200px; resize: vertical;
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px; font-family: var(--mono); font-size: 11px;
    color: var(--text-primary); line-height: 1.4;
  }
  .blend-textarea:focus { outline: none; border-color: var(--accent-bright); }
  .blend-controls-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding-top: 4px; border-top: 1px solid var(--border);
  }
  .blend-weight-label {
    font-size: 11px; color: var(--text-secondary); min-width: 200px;
  }
  .blend-weight-label strong { color: var(--text-primary); font-family: var(--mono); }
  .blend-weight-slider { flex: 1; min-width: 120px; }
  .blend-actions { display: flex; gap: 6px; }
  .btn-recalc, .btn-clear {
    padding: 6px 12px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
    font-family: var(--display); letter-spacing: 0.02em;
    transition: all 0.15s;
  }
  .btn-recalc {
    background: var(--accent); color: white; border-color: var(--accent-bright);
  }
  .btn-recalc:hover:not(:disabled) { background: var(--accent-bright); }
  .btn-recalc:disabled { opacity: 0.4; cursor: not-allowed; background: var(--bg-tertiary); color: var(--text-tertiary); border-color: var(--border); }
  .btn-clear {
    background: transparent; color: var(--text-secondary);
  }
  .btn-clear:hover { background: var(--bg-tertiary); color: var(--text-primary); }

  /* DERIVED MODE PANEL */
  .derived-panel { display: flex; flex-direction: column; gap: 14px; }
  .derived-fallback {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.4);
    border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 12px;
  }
  .derived-fallback-title { color: rgb(245, 158, 11); font-weight: 600; font-size: 13px; }
  .derived-fallback-desc { color: var(--text-secondary); font-size: 12px; line-height: 1.5; }
  .derived-formula-card {
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
  }
  .derived-formula-title {
    font-family: var(--display); font-weight: 600; font-size: 13px;
    color: var(--text-secondary); margin-bottom: 10px; letter-spacing: -0.01em;
  }
  .derived-formula-row {
    display: flex; align-items: center; gap: 10px; padding: 5px 0;
    flex-wrap: wrap; font-size: 12px;
  }
  .derived-team-tag {
    font-family: var(--mono); font-weight: 700; font-size: 11px;
    padding: 3px 8px; border-radius: 4px; min-width: 38px; text-align: center;
  }
  .derived-team-tag.top { background: var(--top-color, var(--accent)); color: white; }
  .derived-team-tag.bot { background: var(--bot-color, var(--accent-bright)); color: white; }
  .derived-formula-equals {
    font-family: var(--mono); color: var(--text-primary); font-weight: 600; font-size: 12px;
  }
  .derived-component {
    font-family: var(--mono); font-size: 11px; color: var(--text-tertiary);
    padding: 2px 6px; background: var(--bg-secondary); border-radius: 3px;
  }
  .derived-formula-divider {
    height: 1px; background: var(--border); margin: 8px 0;
  }
  .derived-formula-label {
    font-size: 12px; color: var(--text-secondary); min-width: 130px;
  }
  .derived-formula-value {
    font-family: var(--mono); font-weight: 600; color: var(--text-primary); font-size: 12px;
  }
  .derived-formula-note {
    font-size: 11px; color: var(--text-tertiary); font-style: italic;
  }
  .derived-output-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  }
  @media (max-width: 720px) {
    .derived-output-grid { grid-template-columns: 1fr; }
  }
  .derived-output-card {
    background: var(--bg-tertiary); border-radius: 10px; padding: 14px;
    border-left: 3px solid var(--accent);
  }
  .derived-output-card.top { border-left-color: var(--top-color, var(--accent)); }
  .derived-output-card.bot { border-left-color: var(--bot-color, var(--accent-bright)); }
  .derived-output-label {
    font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .derived-output-value {
    font-family: var(--display); font-weight: 700; font-size: 26px;
    color: var(--text-primary); margin-bottom: 4px;
  }
  .derived-output-formula {
    font-family: var(--mono); font-size: 10px; color: var(--text-tertiary);
  }
  .derived-source-note {
    font-size: 11px; color: var(--text-tertiary); text-align: center; padding: 4px;
  }
  .derived-source-note code {
    font-family: var(--mono); background: var(--bg-tertiary);
    padding: 1px 5px; border-radius: 3px; color: var(--text-secondary);
  }

  /* MARKETS GRID */
  .markets-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 16px;
  }
  .market {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
  }
  .market:hover { border-color: var(--border-light); }
  .market.wide { grid-column: span 2; }
  @media (max-width: 800px) { .market.wide { grid-column: span 1; } }

  .market-header {
    padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
  }
  .market-title {
    font-family: var(--display); font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .market-tag {
    font-family: var(--mono); font-size: 9px; color: var(--text-tertiary);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .market-tag.settled {
    color: var(--accent-bright); background: rgba(139, 92, 246, 0.12);
    padding: 3px 8px; border-radius: 4px; border: 1px solid var(--accent-dim);
  }
  .market-body { padding: 6px 0; }

  .col-headers {
    display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px;
    padding: 4px 18px 6px; font-family: var(--mono); font-size: 9px;
    font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .col-headers > *:first-child { text-align: left; }
  .col-headers > *:not(:first-child) { text-align: right; min-width: 50px; }
  .col-headers > *:nth-child(2) { min-width: 52px; }
  .col-headers > *:nth-child(4) { min-width: 64px; }

  .row {
    display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px;
    padding: 8px 18px; align-items: center; transition: background 0.1s;
  }
  .row:hover { background: var(--bg-tertiary); }
  .row.muted { opacity: 0.4; }
  .row-label {
    font-size: 13px; color: var(--text-primary); font-weight: 400;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row-prob {
    font-family: var(--mono); font-size: 11px; color: var(--text-tertiary);
    font-weight: 500; min-width: 52px; text-align: right;
  }
  .row-decimal {
    font-family: var(--mono); font-size: 13px; color: var(--text-secondary);
    font-weight: 500; min-width: 50px; text-align: right;
  }
  .row-american {
    font-family: var(--mono); font-size: 14px; font-weight: 600;
    min-width: 64px; text-align: right;
  }
  .row-american.fav { color: var(--text-primary); }
  .row-american.dog { color: var(--accent-bright); }
  .row.current {
    background: rgba(139, 92, 246, 0.08);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .row.current .row-label { color: var(--accent-bright); font-weight: 500; }

  /* MARGIN BADGE */
  .margin-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    padding: 3px 7px; border-radius: 4px; border: 1px solid;
    letter-spacing: 0.04em;
  }
  .margin-badge::before {
    content: 'M'; opacity: 0.6; font-size: 8px;
  }
  .margin-badge.green { color: var(--positive); border-color: rgba(52, 211, 153, 0.3); background: rgba(52, 211, 153, 0.08); }
  .margin-badge.amber { color: var(--warn); border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }
  .margin-badge.red { color: var(--danger); border-color: rgba(248, 113, 113, 0.3); background: rgba(248, 113, 113, 0.08); }
  .margin-badge.underround { color: var(--accent-bright); border-color: var(--accent-dim); background: rgba(139, 92, 246, 0.08); }

  .pair-margin {
    grid-column: 1 / -1; padding: 4px 18px 8px;
    display: flex; justify-content: flex-end;
  }
  .market-footer {
    padding: 10px 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-tertiary);
  }
  .market-footer-label {
    font-family: var(--mono); font-size: 9px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .pair-divider {
    height: 1px; background: var(--border); margin: 4px 18px;
    grid-column: 1 / -1;
  }

  /* BRACKET VIEW (proper bracket layout with row spans) */
  .bracket-view {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 24px;
    overflow-x: auto;
  }
  .bracket-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(140px, 1fr));
    grid-template-rows: 28px repeat(4, minmax(60px, 1fr));
    gap: 8px 12px;
    min-width: 1100px;
  }
  .bracket-col-label {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--text-tertiary); text-align: center; letter-spacing: 0.1em;
    text-transform: uppercase; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    grid-row: 1;
    align-self: end;
  }
  .bracket-cell {
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; cursor: pointer;
    transition: all 0.15s; min-height: 60px; display: flex;
    flex-direction: column; justify-content: center; gap: 4px;
    align-self: center;
  }
  .bracket-cell:hover { border-color: var(--accent); background: var(--bg-elevated); }
  .bracket-cell.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
  .bracket-cell.complete { border-color: var(--positive); }
  .bracket-cell.tbd { opacity: 0.4; }
  .bracket-team {
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--display); font-size: 13px; font-weight: 500;
    color: var(--cell-team-color, var(--text-primary));
  }
  .bracket-team.winner { color: var(--cell-team-color, var(--positive)); font-weight: 700; }
  .bracket-team.eliminated { color: var(--text-disabled); text-decoration: line-through; }
  .bracket-team-score {
    font-family: var(--mono); font-size: 14px; font-weight: 600;
    color: var(--cell-team-color, var(--accent-bright));
  }

  /* OUTRIGHTS BRACKET SECTION */
  .outrights-bracket-section {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-top: 24px;
    overflow-x: auto;
  }
  .outrights-bracket-title {
    font-family: var(--display); font-weight: 600; font-size: 14px;
    color: var(--text-primary); letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .outrights-bracket-section .bracket-grid {
    margin-bottom: 0;
  }

  /* FOOTER */
  .footer {
    margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
    text-align: center; font-family: var(--mono); font-size: 10px;
    color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase;
  }

  @media (max-width: 700px) {
    .header h1 { font-size: 26px; }
    .state-wins { font-size: 44px; }
    .state-divider { font-size: 32px; }
    .manual-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* Derived Cup markets panel (matches admin styling) */
  .derived-cup-panel {
    margin-top: 24px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px;
  }
  .derived-cup-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .derived-cup-header h3 {
    font-family: var(--display); font-size: 14px; font-weight: 600;
    color: var(--text-primary); letter-spacing: -0.01em; margin: 0;
  }
  .derived-cup-hint {
    font-family: var(--mono); font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .market.collapsible { padding: 0; }
  .market.collapsible .market-header {
    cursor: pointer; user-select: none;
    transition: background 0.1s;
  }
  .market.collapsible .market-header:hover { background: rgba(255,255,255,0.02); }
  .market.collapsible.collapsed .market-header { border-bottom: none; }
  .market.collapsible .market-title-wrap {
    display: flex; align-items: center; gap: 10px;
  }
  .market-toggle-caret {
    display: inline-block; width: 10px; height: 10px;
    color: var(--text-tertiary); font-size: 10px;
    transition: transform 0.15s;
  }
  .market.collapsible.collapsed .market-toggle-caret { transform: rotate(-90deg); }
  .market.collapsible .market-content {
    overflow: hidden;
    transition: max-height 0.2s ease, opacity 0.15s ease;
  }
  .market.collapsible.collapsed .market-content {
    max-height: 0; opacity: 0;
  }
  .market.collapsible:not(.collapsed) .market-content {
    max-height: 99999px; opacity: 1;
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div>
      <h1>NHL Playoffs <span class="accent">Pricing</span></h1>
      <div class="subtitle">Series Markets · Markov Model · Live Recompute</div>
    </div>
    <div class="header-right">
      <button id="bracketToggle" class="toggle">⚏ Bracket View</button>
      <div class="brand">
        <div><strong>BetFanatics</strong> Trading</div>
        <div id="generatedAt">Loaded —</div>
      </div>
    </div>
  </header>

  <!-- ROUND TABS -->
  <div class="round-tabs" id="roundTabs"></div>

  <!-- SERIES TABS -->
  <div class="series-tabs" id="seriesTabs"></div>

  <!-- BRACKET VIEW (hidden by default) -->
  <div class="bracket-view" id="bracketView" style="display:none;">
    <div class="bracket-grid" id="bracketGrid"></div>
  </div>

  <!-- MAIN CONTENT (per-series) -->
  <div id="mainContent"></div>

  <div class="footer">
    Session-only. Edits don't persist or affect live config. Use admin tool to update.
  </div>
</div>

<script src="teams.js"></script>
<script src="playoffs.js"></script>
<script src="engine.js"></script>
<script>
(function () {
  const E = window.PlayoffsEngine;
  const DATA = window.PLAYOFFS_DATA;

  // ===== Local session state (deep clone of data so edits don't bleed) =====
  let workingData = JSON.parse(JSON.stringify(DATA));
  let activeRound = 'round1';
  let activeSeriesId = workingData.bracket.east.r1[0]; // start at first East R1 series
  let bracketVisible = false;
  let undoStacks = {}; // per-series undo stack of state

  const ROUND_DEFS = [
    { id: 'round1', label: 'Round 1', getSeriesIds: () => [...workingData.bracket.east.r1, ...workingData.bracket.west.r1] },
    { id: 'round2', label: 'Round 2', getSeriesIds: () => [...workingData.bracket.east.r2, ...workingData.bracket.west.r2] },
    { id: 'round3', label: 'Conference Finals', getSeriesIds: () => [workingData.bracket.east.r3, workingData.bracket.west.r3] },
    { id: 'round4', label: 'Stanley Cup Final', getSeriesIds: () => [workingData.bracket.final] },
    { id: 'outrights', label: 'Outrights', getSeriesIds: () => [], isOutrights: true }
  ];

  function getActiveSeries() {
    return workingData.series[activeSeriesId];
  }

  function isSeriesTBD(s) {
    return !s.topSeed.name || !s.botSeed.name;
  }

  function isSeriesComplete(s) {
    return s.state.topWins >= 4 || s.state.botWins >= 4;
  }

  // ===== RENDER: round tabs =====
  function renderRoundTabs() {
    const el = document.getElementById('roundTabs');
    el.innerHTML = '';
    ROUND_DEFS.forEach(rd => {
      const btn = document.createElement('button');
      btn.className = 'round-tab' + (rd.id === activeRound ? ' active' : '');
      btn.textContent = rd.label;
      if (rd.isOutrights) {
        // Outrights tab is always enabled
        btn.disabled = false;
      } else {
        const ids = rd.getSeriesIds();
        const allTBD = ids.every(id => isSeriesTBD(workingData.series[id]));
        btn.disabled = allTBD;
      }
      btn.addEventListener('click', () => {
        activeRound = rd.id;
        if (!rd.isOutrights) {
          const ids2 = rd.getSeriesIds();
          const first = ids2.find(id => !isSeriesTBD(workingData.series[id])) || ids2[0];
          activeSeriesId = first;
        }
        renderAll();
      });
      el.appendChild(btn);
    });
  }

  // ===== RENDER: series tabs =====
  function renderSeriesTabs() {
    const el = document.getElementById('seriesTabs');
    el.dataset.round = activeRound;
    el.innerHTML = '';
    const rd = ROUND_DEFS.find(r => r.id === activeRound);
    if (rd.isOutrights) {
      el.style.display = 'none';
      return;
    }
    el.style.display = '';
    const ids = rd.getSeriesIds();
    ids.forEach(id => {
      const s = workingData.series[id];
      const tab = document.createElement('button');
      tab.className = 'series-tab';
      if (id === activeSeriesId) tab.classList.add('active');
      if (isSeriesTBD(s)) tab.classList.add('tbd');
      if (isSeriesComplete(s)) tab.classList.add('complete');
      tab.disabled = isSeriesTBD(s);
      const top = s.topSeed.short || s.topSeed.name || 'TBD';
      const bot = s.botSeed.short || s.botSeed.name || 'TBD';
      const score = s.state.topWins + '-' + s.state.botWins;
      tab.innerHTML = `
        <div class="series-tab-teams">${top} vs ${bot}</div>
        <div class="series-tab-score">${score}</div>
      `;
      tab.addEventListener('click', () => {
        if (isSeriesTBD(s)) return;
        activeSeriesId = id;
        renderAll();
      });
      el.appendChild(tab);
    });
  }

  // ===== RENDER: bracket view =====
  // Build the bracket grid as an HTML string with proper row-span placement.
  // 7 columns × (1 header + 8 series rows). East is rows 1-4, West is rows 5-8.
  // R1 cells span 1 row, R2 cells span 2, R3 cells span 4, SCF spans 8.
  function buildBracketHTML() {
    const wd = workingData;
    // Both conferences laid out side-by-side on the same 4 rows.
    // East rows 2-5 (left side), West mirror image rows 2-5 (right side), SCF in middle.
    const positions = [];
    // East R1 (col 1, rows 2-5)
    wd.bracket.east.r1.forEach((id, i) => positions.push({ id, col: 1, row: 2 + i, span: 1 }));
    // East R2 (col 2, each spans 2 rows)
    wd.bracket.east.r2.forEach((id, i) => positions.push({ id, col: 2, row: 2 + i * 2, span: 2 }));
    // East R3 (col 3, spans rows 2-5 = 4 rows)
    positions.push({ id: wd.bracket.east.r3, col: 3, row: 2, span: 4 });
    // SCF (col 4, spans rows 2-5 = 4 rows, centered)
    positions.push({ id: wd.bracket.final, col: 4, row: 2, span: 4 });
    // West R3 (col 5, spans rows 2-5 = 4 rows)
    positions.push({ id: wd.bracket.west.r3, col: 5, row: 2, span: 4 });
    // West R2 (col 6, each spans 2 rows)
    wd.bracket.west.r2.forEach((id, i) => positions.push({ id, col: 6, row: 2 + i * 2, span: 2 }));
    // West R1 (col 7, rows 2-5)
    wd.bracket.west.r1.forEach((id, i) => positions.push({ id, col: 7, row: 2 + i, span: 1 }));

    const labels = [
      { col: 1, text: 'Round 1 (E)' },
      { col: 2, text: 'Round 2 (E)' },
      { col: 3, text: 'Conf Final (E)' },
      { col: 4, text: 'Stanley Cup' },
      { col: 5, text: 'Conf Final (W)' },
      { col: 6, text: 'Round 2 (W)' },
      { col: 7, text: 'Round 1 (W)' }
    ];

    let html = '<div class="bracket-grid">';
    labels.forEach(l => {
      html += `<div class="bracket-col-label" style="grid-column:${l.col};">${l.text}</div>`;
    });
    positions.forEach(p => {
      const s = wd.series[p.id];
      if (!s) return;
      const top = s.topSeed.short || s.topSeed.name || 'TBD';
      const bot = s.botSeed.short || s.botSeed.name || 'TBD';
      const tbd = isSeriesTBD(s) ? 'tbd' : '';
      const complete = isSeriesComplete(s) ? 'complete' : '';
      const active = (p.id === activeSeriesId) ? 'active' : '';
      const topClass = isSeriesComplete(s) && s.state.topWins >= 4 ? 'winner' :
                       isSeriesComplete(s) ? 'eliminated' : '';
      const botClass = isSeriesComplete(s) && s.state.botWins >= 4 ? 'winner' :
                       isSeriesComplete(s) ? 'eliminated' : '';
      const topColor = (typeof NHL_TEAMS !== 'undefined' && NHL_TEAMS[s.topSeed.short])
        ? NHL_TEAMS[s.topSeed.short].home.primary : '';
      const botColor = (typeof NHL_TEAMS !== 'undefined' && NHL_TEAMS[s.botSeed.short])
        ? NHL_TEAMS[s.botSeed.short].home.primary : '';
      html += `
        <div class="bracket-cell ${active} ${complete} ${tbd}"
             style="grid-column:${p.col}; grid-row:${p.row} / span ${p.span};"
             data-bracket-id="${p.id}">
          <div class="bracket-team ${topClass}" ${topClass !== 'eliminated' && topColor ? `style="--cell-team-color:${topColor};"` : ''}>
            <span>${escapeHtml(top)}</span>
            <span class="bracket-team-score">${s.state.topWins}</span>
          </div>
          <div class="bracket-team ${botClass}" ${botClass !== 'eliminated' && botColor ? `style="--cell-team-color:${botColor};"` : ''}>
            <span>${escapeHtml(bot)}</span>
            <span class="bracket-team-score">${s.state.botWins}</span>
          </div>
        </div>
      `;
    });
    html += '</div>';
    return html;
  }

  // Render bracket into the right-rail panel (existing toggle).
  function renderBracket() {
    const el = document.getElementById('bracketView');
    el.innerHTML = buildBracketHTML();
    // Wire click handlers
    el.querySelectorAll('[data-bracket-id]').forEach(cell => {
      cell.addEventListener('click', () => {
        const id = cell.dataset.bracketId;
        const s = workingData.series[id];
        if (isSeriesTBD(s)) return;
        const rd = ROUND_DEFS.find(r => r.getSeriesIds && r.getSeriesIds().includes(id));
        if (rd) activeRound = rd.id;
        activeSeriesId = id;
        bracketVisible = false;
        renderAll();
      });
    });
  }

  // Inline bracket for the outrights view (returns HTML string, wired separately)
  function renderBracketViewInline() {
    return buildBracketHTML();
  }

  // Wire up clickable bracket cells inside the outrights tab inline bracket.
  function wireInlineBracket() {
    document.querySelectorAll('.outrights-bracket-section [data-bracket-id]').forEach(cell => {
      cell.addEventListener('click', () => {
        const id = cell.dataset.bracketId;
        const s = workingData.series[id];
        if (isSeriesTBD(s)) return;
        const rd = ROUND_DEFS.find(r => r.getSeriesIds && r.getSeriesIds().includes(id));
        if (rd) activeRound = rd.id;
        activeSeriesId = id;
        renderAll();
      });
    });
  }


  // ===== RENDER: main content =====
  function renderMain() {
    const el = document.getElementById('mainContent');
    const rd = ROUND_DEFS.find(r => r.id === activeRound);

    // Outrights view (futures markets)
    if (rd && rd.isOutrights) {
      el.innerHTML = renderOutrightsView();
      wireOutrightControls();
      wireInlineBracket();
      return;
    }

    const s = getActiveSeries();
    if (isSeriesTBD(s)) {
      el.innerHTML = `
        <div class="tbd-banner">
          <h2>Waiting on prior round</h2>
          <p>This series will populate once the upstream matchup is decided.</p>
        </div>
      `;
      return;
    }

    el.innerHTML = `
      ${renderControls(s)}
      ${renderStatePanel(s)}
      ${renderEndedBanner(s)}
      ${renderMarkets(s)}
    `;
    applyTeamColors(s);
    wireControls(s);
  }

  // Apply each team's home colors as CSS custom properties.
  function applyTeamColors(s) {
    const root = document.documentElement;
    const top = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS[s.topSeed.short] : null;
    const bot = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS[s.botSeed.short] : null;
    root.style.setProperty('--top-color', top ? top.home.primary : '#f97316');
    root.style.setProperty('--top-color-secondary', top ? top.home.secondary : '#ffffff');
    root.style.setProperty('--top-color-away', top ? top.away.primary : '#f97316');
    root.style.setProperty('--bot-color', bot ? bot.home.primary : '#06b6d4');
    root.style.setProperty('--bot-color-secondary', bot ? bot.home.secondary : '#ffffff');
    root.style.setProperty('--bot-color-away', bot ? bot.away.primary : '#06b6d4');
  }

  // ===== RENDER: controls =====
  function renderControls(s) {
    const mode = s.mode || 'derived';
    const teams = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS : {};
    const topShort = s.topSeed && s.topSeed.short;
    const botShort = s.botSeed && s.botSeed.short;
    const tp = (topShort && teams[topShort] && teams[topShort].power) ? teams[topShort].power : null;
    const bp = (botShort && teams[botShort] && teams[botShort].power) ? teams[botShort].power : null;
    const bothKnown = tp && bp;

    return `
      <div class="controls">
        <div class="controls-header">
          <div class="controls-title">${s.label} — Pricing Inputs</div>
          <div class="mode-actions">
            <span class="mode-indicator ${mode}">${mode === 'manual' ? 'MANUAL' : 'MONEYPUCK'}</span>
            ${mode === 'manual' && bothKnown ? '<button class="btn-reset" data-action="reset-derived">Reset to MoneyPuck</button>' : ''}
          </div>
        </div>
        ${renderTeamIdentity(s, tp, bp)}
        ${bothKnown ? renderUnifiedGameGrid(s) : renderTBDFallback(s)}
      </div>
    `;
  }

  function renderTeamIdentity(s, tp, bp) {
    const fmt = (v) => (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%';
    return `
      <div class="identity-grid">
        <div class="control-group">
          <label>Top Seed (Home: G1, G2, G5, G7)</label>
          <div class="team-input">
            <span class="team-dot top"></span>
            <input type="text" id="topName" value="${escapeHtml(s.topSeed.name || '')}">
            ${tp ? `<span class="team-power-tag">${fmt(tp.score)}</span>` : ''}
          </div>
        </div>
        <div class="control-group">
          <label>Bottom Seed (Home: G3, G4, G6)</label>
          <div class="team-input">
            <span class="team-dot bot"></span>
            <input type="text" id="botName" value="${escapeHtml(s.botSeed.name || '')}">
            ${bp ? `<span class="team-power-tag">${fmt(bp.score)}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function renderTBDFallback(s) {
    return `
      <div class="derived-fallback">
        <div class="derived-fallback-title">⚠️ Series is TBD</div>
        <div class="derived-fallback-desc">
          One or both teams are not yet slotted. Per-game prices will populate once
          both teams are assigned. Outright markets continue to project this series
          using full matchup enumeration.
        </div>
      </div>
    `;
  }

  // Unified per-game grid: 7 games, all editable, defaulted from MoneyPuck (derived).
  // Editing any game switches series mode to 'manual' and persists the per-game value.
  function renderUnifiedGameGrid(s) {
    const totalPlayed = s.state.topWins + s.state.botWins;
    let gamesHtml = '';
    for (let g = 1; g <= 7; g++) {
      const isHome = E.isTopHome(g);
      const homeClass = isHome ? 'top' : 'bot';
      const homeLabel = isHome ? (s.topSeed.short || 'TOP') : (s.botSeed.short || 'BOT');
      const played = g <= totalPlayed;
      const stateBefore = E.stateAfterGame(s, g - 1);
      const stateAfter = E.stateAfterGame(s, g);
      let resultClass = '', resultText = '';
      if (played && stateBefore && stateAfter) {
        if (stateAfter[0] > stateBefore[0]) {
          resultClass = 'top-won';
          resultText = (s.topSeed.short || 'TOP') + ' WON';
        } else {
          resultClass = 'bot-won';
          resultText = (s.botSeed.short || 'BOT') + ' WON';
        }
      }
      // Get the current per-game prob from whatever mode is active
      const prob = E.topWinProbForGame(s, g);
      const american = E.probToAmerican(prob);
      gamesHtml += `
        <div class="manual-game ${played ? 'played ' + resultClass : ''}">
          <div class="manual-game-label">
            <span>G${g}</span>
            <span class="manual-game-home ${homeClass}">${escapeHtml(homeLabel)} home</span>
          </div>
          <input type="text" data-game="${g}" class="manual-input" value="${american}" ${played ? 'disabled' : ''}>
          <div class="manual-game-implied">${(prob * 100).toFixed(1)}% top</div>
          ${played ? `<div class="manual-game-result ${resultClass}">${resultText}</div>` : ''}
        </div>
      `;
    }
    return `
      <div class="control-group" style="margin-top: 10px;">
        <label>Per-Game Top Seed Win Odds (American) — edit any to override MoneyPuck</label>
        <div class="manual-grid">${gamesHtml}</div>
      </div>
    `;
  }




  // ===== RENDER: state panel =====
  function renderStatePanel(s) {
    const totalPlayed = s.state.topWins + s.state.botWins;
    const ended = isSeriesComplete(s);
    const nextGame = ended ? null : totalPlayed + 1;
    const undoCount = (undoStacks[activeSeriesId] || []).length;

    let scheduleHtml = '';
    for (let g = 1; g <= 7; g++) {
      const home = E.isTopHome(g) ? 'top-home' : 'bot-home';
      const played = g <= totalPlayed ? 'played' : '';
      const next = g === nextGame ? 'next' : '';
      scheduleHtml += `<div class="game-pip ${home} ${played} ${next}">${g}</div>`;
    }

    return `
      <div class="state-panel">
        <div class="state-display">
          <div class="state-team top">
            <div class="state-team-name">${escapeHtml(s.topSeed.name)}</div>
            <div class="state-wins">${s.state.topWins}</div>
          </div>
          <div class="state-divider">·</div>
          <div class="state-team bot">
            <div class="state-team-name">${escapeHtml(s.botSeed.name)}</div>
            <div class="state-wins">${s.state.botWins}</div>
          </div>
          <div class="state-meta">
            <div>Game <strong>${ended ? '—' : nextGame}</strong> next</div>
            <div>Home: <strong>${ended ? '—' : (E.isTopHome(nextGame) ? s.topSeed.name : s.botSeed.name)}</strong></div>
            <div class="schedule">${scheduleHtml}</div>
          </div>
        </div>
        <div class="state-actions">
          <button class="undo" id="undoBtn" ${undoCount === 0 ? 'disabled' : ''}>← Undo</button>
          <button class="win-top" id="topWinBtn" ${ended ? 'disabled' : ''}>
            <span class="team-dot top"></span> ${escapeHtml(s.topSeed.short || 'TOP')} Wins Game ${ended ? '' : nextGame}
          </button>
          <button class="win-bot" id="botWinBtn" ${ended ? 'disabled' : ''}>
            <span class="team-dot bot"></span> ${escapeHtml(s.botSeed.short || 'BOT')} Wins Game ${ended ? '' : nextGame}
          </button>
          <button class="reset" id="resetBtn">⟲ Reset</button>
        </div>
      </div>
    `;
  }

  function renderEndedBanner(s) {
    if (!isSeriesComplete(s)) return '';
    const winner = s.state.topWins >= 4 ? s.topSeed.name : s.botSeed.name;
    const score = Math.max(s.state.topWins, s.state.botWins) + '–' + Math.min(s.state.topWins, s.state.botWins);
    return `
      <div class="series-ended">
        Series Complete
        <div class="winner">${escapeHtml(winner)} ${score}</div>
      </div>
    `;
  }

  // ===== RENDER: markets =====
  function renderMarkets(s) {
    const m = E.computeMarkets(s, workingData.defaults);

    return `
      <div class="markets-grid">
        ${renderPairedMarket('Series Winner', '2-Way', m.seriesWinner)}
        ${renderExactMarket('Correct Score', '8-Way Exact', m.correctScore)}
        ${renderPairedMarket('Total Games', 'O/U Lines', m.totalGamesOU)}
        ${renderExactMarket('Exact Games', '4-Way', m.exactGames)}
        ${renderPairedMarket('Series Spreads', '±1.5 / 2.5 / 3.5', m.spreads, true)}
        ${renderExactMarket('Series Score After Game 3', m.afterG3.settled ? 'SETTLED' : '4-Way', m.afterG3, m.afterG3.settled)}
        ${renderExactMarket('Series Score After Game 4', m.afterG4.settled ? 'SETTLED' : '5-Way', m.afterG4, m.afterG4.settled)}
        ${renderExactMarket('From Behind / Never Trail', '4-Way', m.fromBehind, false, true)}
        ${renderExactMarket('Game 1 Winner / Series Winner', '4-Way', m.g1AndSeries)}
      </div>
    `;
  }

  // ===== RENDER: outrights / futures view =====
  // Pricing uses BASELINE DRIFT mode. At export time, admin bakes a snapshot of
  // anchored Cup probs and pure-model Cup probs into playoffs.js. Pricing applies
  // a per-team multiplier (anchor / model_at_baseline) on top of model_at_current_state.
  // Net effect: at export time, pricing == admin. As bracket state changes, anchored
  // values drift naturally with the model. Conference biases stay applied (sticky).
  function renderOutrightsView() {
    const o = E.computeOutrights(workingData, { useBaselineDrift: true });

    const renderTeamRow = (team, probField, offeredField, biasField) => {
      const fair = team[probField];
      const offered = team[offeredField];
      const dec = E.probToDecimal(offered);
      const american = E.decimalToAmerican(dec);
      const isFav = dec > 0 && dec < 2;
      const muted = team.eliminated ? 'muted eliminated' : (fair < 0.001 ? 'muted' : '');
      const teamData = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS[team.short] : null;
      const accent = teamData ? teamData.home.primary : 'var(--accent-bright)';
      // Pricing page hides biases — admin-only signal.
      const elimBadge = team.eliminated ? '<span class="elim-badge">OUT</span>' : '';

      return `
        <div class="row ${muted}" style="--row-team-color:${accent};">
          <div class="row-label outright-team">
            <span class="outright-team-dot" style="background:${accent};"></span>
            <div class="outright-team-stack">
              <div class="outright-team-line">
                <span class="outright-team-short">${escapeHtml(team.short)}</span>
                <span class="outright-team-name">${escapeHtml(team.name)}</span>
                ${elimBadge}
              </div>
            </div>
          </div>
          <div class="row-prob">${team.eliminated ? '—' : E.fmtPct(fair)}</div>
          <div class="row-decimal">${team.eliminated ? '—' : E.fmtDecimal(dec)}</div>
          <div class="row-american ${team.eliminated ? '' : (isFav ? 'fav' : 'dog')}">${team.eliminated ? '—' : american}</div>
        </div>
      `;
    };

    const renderOutrightCard = (title, subtitle, teams, probField, offeredField, biasField, totalMargin, round, wide) => {
      const rowsHtml = teams.map(t => renderTeamRow(t, probField, offeredField, biasField)).join('');
      return `
        <div class="market ${wide ? 'wide' : ''}">
          <div class="market-header">
            <div class="market-title">${title}</div>
            <div class="market-tag">R${round} · ${subtitle}</div>
          </div>
          <div class="col-headers"><span>Team</span><span>Prob</span><span>Dec</span><span>US</span></div>
          <div class="market-body">${rowsHtml}</div>
          <div class="market-footer">
            <span class="market-footer-label">Overall Margin</span>
            ${renderMarginBadge(totalMargin)}
          </div>
        </div>
      `;
    };

    return `
      <div class="markets-grid">
        ${renderOutrightCard('Eastern Conference Winner', '8 teams', o.eastTeams, 'fairWinConference', 'offeredWinConference', 'biasConference', o.eastConfMargin, o.eastRound)}
        ${renderOutrightCard('Western Conference Winner', '8 teams', o.westTeams, 'fairWinConference', 'offeredWinConference', 'biasConference', o.westConfMargin, o.westRound)}
        ${renderOutrightCard('Stanley Cup Winner', '16 teams', o.allTeamsByCup, 'fairWinStanleyCup', 'offeredWinStanleyCup', 'biasStanleyCup', o.scfMargin, o.scfRound, true)}
      </div>

      ${renderDerivedCupMarkets()}

      <div class="outrights-bracket-section">
        <div class="outrights-bracket-title">Bracket Overview</div>
        ${renderBracketViewInline()}
      </div>
    `;
  }

  // ===== DERIVED CUP MARKETS (pricing — read-only) =====
  // Five markets derived from Stanley Cup probabilities. Default state matches admin:
  // Conference, Division, Country, First-Time open; SCF Exact Result collapsed (128 rows).
  const PRICING_DERIVED_CUP_COLLAPSED = new Set(['scfExactResult']);

  function renderDerivedCupMarkets() {
    // Same as renderOutrightsView: baseline drift so derived markets reflect
    // model-driven movement on top of admin-anchored starting points.
    const o = E.computeOutrights(workingData, { useBaselineDrift: true });
    const teamsTable = (typeof NHL_TEAMS !== 'undefined') ? NHL_TEAMS : null;
    let d;
    try {
      d = E.computeDerivedCupMarkets(workingData, o, teamsTable);
    } catch (err) {
      return `<div class="derived-cup-panel"><div class="derived-cup-header"><h3>Derived Cup Markets</h3></div><div style="color:var(--text-tertiary);font-size:12px;">Could not compute: ${escapeHtml(err.message)}</div></div>`;
    }

    const cards = [
      { key: 'conferenceOfCupWinner', title: 'Conference of Cup Winner',     tag: '2-Way',     kind: 'paired', market: d.conferenceOfCupWinner },
      { key: 'divisionOfCupWinner',   title: 'Division of Cup Winner',       tag: '4-Way',     kind: 'exact',  market: d.divisionOfCupWinner },
      { key: 'countryOfCupWinner',    title: 'Country of Cup Winner',        tag: '2-Way',     kind: 'paired', market: d.countryOfCupWinner },
      { key: 'firstTimeCupWinner',    title: 'First-Time Cup Winner',        tag: 'Yes / No',  kind: 'paired', market: d.firstTimeCupWinner },
      { key: 'scfExactResult',        title: 'Stanley Cup Finals Exact Result', tag: d.scfExactResult.legs.length + '-Way', kind: 'exact', market: d.scfExactResult, wide: true }
    ];

    const cardsHtml = cards.map(c => {
      const collapsed = PRICING_DERIVED_CUP_COLLAPSED.has(c.key);
      const bodyHtml = (c.kind === 'paired')
        ? buildPairedBody(c.market)
        : buildExactBody(c.market);

      return `
        <div class="market collapsible ${collapsed ? 'collapsed' : ''} ${c.wide ? 'wide' : ''}" data-derived-cup-key="${c.key}">
          <div class="market-header" data-toggle-derived-cup="${c.key}">
            <div class="market-title-wrap">
              <span class="market-toggle-caret">▼</span>
              <div class="market-title">${escapeHtml(c.title)}</div>
            </div>
            <div class="market-tag">${escapeHtml(c.tag)}</div>
          </div>
          <div class="market-content">
            ${bodyHtml}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="derived-cup-panel">
        <div class="derived-cup-header">
          <h3>Derived Cup Markets <span class="derived-cup-hint">· derived from Cup prices</span></h3>
        </div>
        <div class="markets-grid">${cardsHtml}</div>
      </div>
    `;
  }

  function buildPairedBody(market) {
    const pairsHtml = market.pairs.map((p, idx) => `
      ${idx > 0 ? '<div class="pair-divider"></div>' : ''}
      ${p.legs.map(renderRow).join('')}
      <div class="pair-margin">${renderMarginBadge(p.margin)}</div>
    `).join('');
    return `
      <div class="col-headers"><span>Selection</span><span>Prob</span><span>Dec</span><span>US</span></div>
      <div class="market-body">${pairsHtml}</div>
    `;
  }

  function buildExactBody(market) {
    const rowsHtml = market.legs.map(renderRow).join('');
    return `
      <div class="col-headers"><span>Selection</span><span>Prob</span><span>Dec</span><span>US</span></div>
      <div class="market-body">${rowsHtml}</div>
      <div class="market-footer">
        <span class="market-footer-label">Overall Margin</span>
        ${renderMarginBadge(market.overallMargin)}
      </div>
    `;
  }

  function wireDerivedCupMarkets() {
    document.querySelectorAll('[data-toggle-derived-cup]').forEach(header => {
      header.addEventListener('click', () => {
        const key = header.getAttribute('data-toggle-derived-cup');
        const card = header.closest('.market');
        const isCollapsed = card.classList.toggle('collapsed');
        if (isCollapsed) PRICING_DERIVED_CUP_COLLAPSED.add(key);
        else PRICING_DERIVED_CUP_COLLAPSED.delete(key);
      });
    });
  }

  // Pricing page is read-only for outrights — no controls to wire.
  function wireOutrightControls() {
    // Cup price editing happens in admin only — but the derived markets panel
    // does have collapsible toggles that need wiring.
    wireDerivedCupMarkets();
  }

  function renderRow(leg) {
    const dec = E.probToDecimal(leg.offered);
    const american = E.decimalToAmerican(dec);
    const isFav = dec > 0 && dec < 2;
    const muted = leg.fair < 0.001 ? 'muted' : '';
    const current = leg.current ? 'current' : '';
    return `
      <div class="row ${muted} ${current}">
        <div class="row-label">${escapeHtml(leg.label)}</div>
        <div class="row-prob">${E.fmtPct(leg.fair)}</div>
        <div class="row-decimal">${E.fmtDecimal(dec)}</div>
        <div class="row-american ${isFav ? 'fav' : 'dog'}">${american}</div>
      </div>
    `;
  }

  function renderMarginBadge(margin) {
    return `<span class="margin-badge ${E.marginBadgeColor(margin)}">${E.fmtMargin(margin)}</span>`;
  }

  function renderPairedMarket(title, tag, market, wide) {
    const pairsHtml = market.pairs.map((p, idx) => {
      return `
        ${idx > 0 ? '<div class="pair-divider"></div>' : ''}
        ${p.legs.map(renderRow).join('')}
        <div class="pair-margin">${renderMarginBadge(p.margin)}</div>
      `;
    }).join('');
    return `
      <div class="market ${wide ? 'wide' : ''}">
        <div class="market-header">
          <div class="market-title">${title}</div>
          <div class="market-tag">${tag}</div>
        </div>
        <div class="col-headers"><span>Selection</span><span>Prob</span><span>Dec</span><span>US</span></div>
        <div class="market-body">${pairsHtml}</div>
      </div>
    `;
  }

  function renderExactMarket(title, tag, market, settled, wide) {
    const rowsHtml = market.legs.map(renderRow).join('');
    const tagClass = settled ? 'market-tag settled' : 'market-tag';
    return `
      <div class="market ${wide ? 'wide' : ''}">
        <div class="market-header">
          <div class="market-title">${title}</div>
          <div class="${tagClass}">${tag}</div>
        </div>
        <div class="col-headers"><span>Selection</span><span>Prob</span><span>Dec</span><span>US</span></div>
        <div class="market-body">${rowsHtml}</div>
        <div class="market-footer">
          <span class="market-footer-label">Overall Margin</span>
          ${renderMarginBadge(market.overallMargin)}
        </div>
      </div>
    `;
  }

  // ===== WIRE controls =====
  function wireControls(s) {
    // Reset to MoneyPuck button (only in manual mode)
    const resetBtn = document.querySelector('[data-action="reset-derived"]');
    if (resetBtn) resetBtn.addEventListener('click', () => {
      s.mode = 'derived';
      renderMain();
    });

    // Team names
    const topNameEl = document.getElementById('topName');
    if (topNameEl) topNameEl.addEventListener('input', e => {
      s.topSeed.name = e.target.value || 'Top Seed';
      renderSeriesTabs();
      renderMain();
    });
    const botNameEl = document.getElementById('botName');
    if (botNameEl) botNameEl.addEventListener('input', e => {
      s.botSeed.name = e.target.value || 'Bottom Seed';
      renderSeriesTabs();
      renderMain();
    });

    // Per-game inputs: editing any game switches the series to manual mode and
    // seeds all 7 game values from the previously active mode (so the user only
    // has to override what they want to change).
    document.querySelectorAll('.manual-input').forEach(inp => {
      inp.addEventListener('change', e => {
        const game = parseInt(e.target.dataset.game, 10);
        const american = e.target.value.trim();
        const prob = E.americanToProb(american);
        if (prob === null || isNaN(prob)) {
          // Invalid input — restore current value
          e.target.value = E.probToAmerican(E.topWinProbForGame(s, game));
          return;
        }
        // Seed all games from current mode if switching from derived
        if (s.mode !== 'manual') {
          for (let g = 1; g <= 7; g++) {
            s.manual['game' + g] = E.topWinProbForGame(s, g);
          }
          s.mode = 'manual';
        }
        s.manual['game' + game] = prob;
        renderMain();
      });
    });

    // State buttons
    const undoBtn = document.getElementById('undoBtn');
    if (undoBtn) undoBtn.addEventListener('click', () => {
      const stack = undoStacks[activeSeriesId] || [];
      if (stack.length === 0) return;
      const prev = stack.pop();
      s.state.topWins = prev.topWins;
      s.state.botWins = prev.botWins;
      s.state.history = prev.history;
      renderAll();
    });

    const topWinBtn = document.getElementById('topWinBtn');
    if (topWinBtn) topWinBtn.addEventListener('click', () => {
      pushUndo(s);
      s.state.topWins++;
      s.state.history.push([s.state.topWins, s.state.botWins]);
      renderAll();
    });
    const botWinBtn = document.getElementById('botWinBtn');
    if (botWinBtn) botWinBtn.addEventListener('click', () => {
      pushUndo(s);
      s.state.botWins++;
      s.state.history.push([s.state.topWins, s.state.botWins]);
      renderAll();
    });
    const resetStateBtn = document.getElementById('resetBtn');
    if (resetStateBtn) resetStateBtn.addEventListener('click', () => {
      pushUndo(s);
      s.state.topWins = 0;
      s.state.botWins = 0;
      s.state.history = [[0, 0]];
      renderAll();
    });
  }

  function pushUndo(s) {
    if (!undoStacks[activeSeriesId]) undoStacks[activeSeriesId] = [];
    undoStacks[activeSeriesId].push({
      topWins: s.state.topWins,
      botWins: s.state.botWins,
      history: s.state.history.slice()
    });
  }

  // ===== HELPERS =====
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // ===== RENDER ALL =====
  function renderAll() {
    document.getElementById('generatedAt').textContent =
      'Updated ' + (workingData.generatedAt || 'unknown').split('T')[0];
    renderRoundTabs();
    renderSeriesTabs();
    if (bracketVisible) {
      document.getElementById('bracketView').style.display = '';
      renderBracket();
    } else {
      document.getElementById('bracketView').style.display = 'none';
    }
    renderMain();
  }

  // ===== INITIAL WIRE =====
  document.getElementById('bracketToggle').addEventListener('click', () => {
    bracketVisible = !bracketVisible;
    document.getElementById('bracketToggle').classList.toggle('active', bracketVisible);
    if (bracketVisible) {
      document.getElementById('bracketView').style.display = '';
      renderBracket();
    } else {
      document.getElementById('bracketView').style.display = 'none';
    }
  });

  renderAll();
})();
</script>

</body>
</html>
